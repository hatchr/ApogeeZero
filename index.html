<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Apogee Zero</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #000; overflow: hidden; cursor: crosshair; font-family: 'Courier New', monospace; }
canvas { display: block; }
#gameOver {
  display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  background: rgba(0,0,0,0.85); z-index: 10;
  flex-direction: column; align-items: center; justify-content: center;
  overflow-y: auto; padding: 20px 0;
}
#gameOver.active { display: flex; }
#gameOver h1 { color: #f44; font-size: 48px; text-shadow: 0 0 20px #f44; margin-bottom: 20px; }
#gameOver .stats { color: #0ff; font-size: 22px; margin: 8px 0; text-shadow: 0 0 10px #0ff; }
#gameOver .leaderboard { margin-top: 20px; color: #fff; font-size: 16px; }
#gameOver .leaderboard h2 { color: #ff0; font-size: 24px; text-shadow: 0 0 10px #ff0; margin-bottom: 10px; }
#gameOver .lb-entry { margin: 4px 0; color: #aef; }
#gameOver .lb-entry.gold { color: #ff0; }
#nameInput {
  background: transparent; border: 2px solid #0ff; color: #0ff; font-family: inherit;

}
#nameInput::placeholder { color: #066; }
#submitScore {
  background: transparent; border: 2px solid #0f0; color: #0f0; font-family: inherit;
  font-size: 18px; padding: 8px 24px; cursor: pointer; margin: 5px;
}
#submitScore:hover { background: #0f02; }
#restartBtn {
  background: transparent; border: 2px solid #0ff; color: #0ff; font-family: inherit;
  font-size: 18px; padding: 8px 24px; cursor: pointer; margin: 5px;
}
#restartBtn:hover { background: #0ff2; }
#startScreen {
  position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  background: rgba(0,0,0,0.9); z-index: 10;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  overflow-y: auto; padding: 20px 0;
}
#startScreen.hidden { display: none; }
#startScreen h1 { color: #0ff; font-size: 56px; text-shadow: 0 0 30px #0ff; margin-bottom: 10px; }
#startScreen .sub { color: #88f; font-size: 18px; margin-bottom: 30px; }
#startScreen .controls { color: #aaa; font-size: 14px; line-height: 2; margin-bottom: 30px; text-align: center; }
#startScreen .controls span { color: #0ff; }
#startBtn {
  background: transparent; border: 2px solid #0ff; color: #0ff; font-family: inherit;
  font-size: 24px; padding: 12px 40px; cursor: pointer;
}
#startBtn:hover { background: #0ff2; }
@media (max-height: 500px) {
  #gameOver h1 { font-size: 28px; margin-bottom: 6px; }
  #gameOver .stats { font-size: 14px; margin: 3px 0; }
  #gameOver .leaderboard { margin-top: 8px; font-size: 13px; }
  #gameOver .leaderboard h2 { font-size: 16px; margin-bottom: 4px; }
  #gameOver .lb-entry { margin: 2px 0; }
  #nameInput { font-size: 14px; padding: 4px 10px; margin: 6px 0; }
  #submitScore, #restartBtn { font-size: 13px; padding: 4px 14px; margin: 3px; }
  #startScreen h1 { font-size: 30px; margin-bottom: 4px; }
  #startScreen .sub { font-size: 13px; margin-bottom: 8px; }
  #startScreen .controls { font-size: 12px; line-height: 1.6; margin-bottom: 10px; }
  #startBtn { font-size: 16px; padding: 8px 28px; }
}
#joystickBase {
  display: none; position: fixed; width: 120px; height: 120px; border-radius: 50%;
  border: 2px solid rgba(0,255,255,0.2); background: rgba(0,255,255,0.04); z-index: 6; pointer-events: none;
}
#joystickStick {
  position: absolute; width: 50px; height: 50px; border-radius: 50%;
  background: rgba(0,200,255,0.3); border: 2px solid #0cf;
  top: 50%; left: 50%; transform: translate(-50%,-50%);
}
#rJoyBase {
  display: none; position: fixed; width: 120px; height: 60px; border-radius: 30px;
  border: 2px solid rgba(0,255,0,0.2); background: rgba(0,255,0,0.04);
  z-index: 6; pointer-events: none; overflow: hidden;
}
#rJoyStick {
  position: absolute; width: 50px; height: 50px; border-radius: 50%;
  background: rgba(0,200,100,0.3); border: 2px solid #0c6;
  top: 50%; left: 50%; transform: translate(-50%, -50%);
}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="startScreen">
  <h1>APOGEE ZERO</h1>
  <div class="sub">Endless Survival</div>
  <div class="controls">
    <span>W A S D</span> — Thrust<br>
    <span>Mouse</span> — Aim (left/right to rotate)<br>
    <span>Left Click</span> — Plasma Bolt<br>
    <span>Right Click</span> — Missile<br>
  </div>
  <button id="startBtn">START GAME</button>
</div>
<div id="gameOver">
  <h1>GAME OVER</h1>
  <div class="stats" id="finalScore"></div>
  <div class="stats" id="finalWave"></div>
  <input type="text" id="nameInput" placeholder="Enter your name" maxlength="12">
  <div>
    <button id="submitScore">SAVE SCORE</button>
    <button id="restartBtn">PLAY AGAIN</button>
  </div>
  <div class="leaderboard" id="leaderboard"></div>
</div>
<div id="joystickBase"><div id="joystickStick"></div></div>
<div id="rJoyBase"><div id="rJoyStick"></div></div>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const isMobile = window.matchMedia('(pointer: coarse) and (hover: none)').matches;
const MAX_PARTICLES = isMobile ? 120 : 300;
function glow(blur, color) { if (!isMobile) { ctx.shadowBlur = blur; if (color) ctx.shadowColor = color; } }

// ─── Audio System ────────────────────────────────────────────────────────────
let _ac = null, _nBuf = null, _engGain = null, _thrustOn = false;

function _initAudio() {
  if (_ac) {
    // iOS suspends the context between interactions — resume if needed
    if (_ac.state === 'suspended') _ac.resume();
    return;
  }
  try {
    _ac = new (window.AudioContext || window.webkitAudioContext)();
    _ac.resume(); // iOS starts contexts suspended
    // Build white-noise buffer (0.5 s, reused for all noise sources)
    const len = Math.ceil(_ac.sampleRate * 0.5);
    _nBuf = _ac.createBuffer(1, len, _ac.sampleRate);
    const d = _nBuf.getChannelData(0);
    for (let i = 0; i < len; i++) d[i] = Math.random() * 2 - 1;
    // Continuous engine noise chain — gain starts at 0
    const src = _ac.createBufferSource(); src.buffer = _nBuf; src.loop = true;
    const bp  = _ac.createBiquadFilter(); bp.type = 'bandpass'; bp.frequency.value = 110; bp.Q.value = 1.2;
    const lp  = _ac.createBiquadFilter(); lp.type = 'lowpass';  lp.frequency.value = 400;
    _engGain  = _ac.createGain(); _engGain.gain.value = 0;
    src.connect(bp); bp.connect(lp); lp.connect(_engGain); _engGain.connect(_ac.destination);
    src.start();
  } catch(e) {}
}

// Synthesise a sweeping oscillator burst
function _tone(f0, f1, dur, vol, type = 'square') {
  if (!_ac) return;
  const t = _ac.currentTime;
  const osc = _ac.createOscillator(), g = _ac.createGain();
  osc.type = type;
  osc.frequency.setValueAtTime(f0, t);
  osc.frequency.exponentialRampToValueAtTime(Math.max(f1, 1), t + dur);
  g.gain.setValueAtTime(0.001, t);
  g.gain.exponentialRampToValueAtTime(vol, t + 0.005);
  g.gain.exponentialRampToValueAtTime(0.001, t + dur);
  osc.connect(g); g.connect(_ac.destination);
  osc.start(t); osc.stop(t + dur);
}

// Synthesise a filtered noise burst
function _noise(ftype, freq, dur, vol, Q = 1) {
  if (!_ac || !_nBuf) return;
  const t = _ac.currentTime;
  const src = _ac.createBufferSource(); src.buffer = _nBuf; src.loop = true;
  const filt = _ac.createBiquadFilter(); filt.type = ftype; filt.frequency.value = freq; filt.Q.value = Q;
  const g = _ac.createGain();
  g.gain.setValueAtTime(0.001, t);
  g.gain.exponentialRampToValueAtTime(vol, t + 0.01);
  g.gain.exponentialRampToValueAtTime(0.001, t + dur);
  src.connect(filt); filt.connect(g); g.connect(_ac.destination);
  src.start(t); src.stop(t + dur);
}

// FM synthesis: sine carrier modulated by a sine
function _fm(carFreq, modFreq, modDepth, dur, vol) {
  if (!_ac) return;
  const t = _ac.currentTime;
  const mod = _ac.createOscillator(), modG = _ac.createGain();
  const car = _ac.createOscillator(), g = _ac.createGain();
  mod.frequency.value = modFreq; modG.gain.value = modDepth;
  mod.connect(modG); modG.connect(car.frequency);
  car.type = 'sine'; car.frequency.value = carFreq;
  g.gain.setValueAtTime(0.001, t);
  g.gain.exponentialRampToValueAtTime(vol, t + 0.005);
  g.gain.exponentialRampToValueAtTime(0.001, t + dur);
  car.connect(g); g.connect(_ac.destination);
  mod.start(t); mod.stop(t + dur);
  car.start(t); car.stop(t + dur);
}
function sndPlasma(isPlayer) {
  _fm(isPlayer ? 550 : 380, isPlayer ? 140 : 95, isPlayer ? 400 : 260, isPlayer ? 0.08 : 0.09, isPlayer ? 0.15 : 0.065);
}
function sndMissileFire() {
  if (!_ac) return;
  _tone(120, 35, 0.18, 0.38, 'sine');
  // Whoosh tail: bandpass noise sweeping up in frequency
  const t = _ac.currentTime;
  const src = _ac.createBufferSource(); src.buffer = _nBuf; src.loop = true;
  const filt = _ac.createBiquadFilter(); filt.type = 'bandpass'; filt.Q.value = 1.8;
  filt.frequency.setValueAtTime(150, t + 0.05);
  filt.frequency.exponentialRampToValueAtTime(900, t + 0.35);
  const ng = _ac.createGain();
  ng.gain.setValueAtTime(0, t);
  ng.gain.linearRampToValueAtTime(0.22, t + 0.08);
  ng.gain.exponentialRampToValueAtTime(0.001, t + 0.35);
  src.connect(filt); filt.connect(ng); ng.connect(_ac.destination);
  src.start(t); src.stop(t + 0.35);
}
function sndHit(vol) {
  _noise('lowpass', 550, 0.12, vol);
  _tone(220, 70, 0.12, vol * 0.7, 'sine');
}
function sndExplosion(big) {
  _noise('lowpass', big ? 160 : 320, big ? 0.8 : 0.35, big ? 0.55 : 0.32);
  if (big) _tone(75, 28, 0.8, 0.28, 'sine');
}
function sndPickup(type) {
  if (!_ac) return;
  const map = { health:[440,554,659], shield:[523,659,784], spread:[392,494,587], homing:[330,415,494], emp:[880,440,220] };
  (map[type] || [440,554,659]).forEach((f, i) => {
    const t = _ac.currentTime + i * 0.07;
    const osc = _ac.createOscillator(), g = _ac.createGain();
    osc.type = 'sine'; osc.frequency.value = f;
    g.gain.setValueAtTime(0.001, t);
    g.gain.exponentialRampToValueAtTime(0.28, t + 0.01);
    g.gain.exponentialRampToValueAtTime(0.001, t + 0.18);
    osc.connect(g); g.connect(_ac.destination);
    osc.start(t); osc.stop(t + 0.2);
  });
}
function sndImpact() {
  _noise('lowpass', 380, 0.18, 0.30);
  _tone(140, 45, 0.16, 0.22, 'sine');
}
function sndEMP() {
  _noise('bandpass', 1600, 0.65, 0.45, 3.5);
  _tone(1400, 35, 0.65, 0.32, 'sawtooth');
}
function sndEngineUpdate(on) {
  if (!_engGain || on === _thrustOn) return;
  _thrustOn = on;
  const t = _ac.currentTime;
  _engGain.gain.cancelScheduledValues(t);
  _engGain.gain.setValueAtTime(_engGain.gain.value, t);
  _engGain.gain.linearRampToValueAtTime(on ? 0.20 : 0, t + (on ? 0.06 : 0.15));
}
// ─────────────────────────────────────────────────────────────────────────────
let W, H, viewZoom = 1;
function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
  // Zoom out on small screens so enemies are visible before they're on top of you.
  // Reference min-dimension 700px → zoom 1.0 (desktop untouched). Below that, shrink.
  viewZoom = Math.min(1, Math.min(W, H) / 700);
}
resize();
window.addEventListener('resize', resize);

// Input
const keys = {};
let mouseDX = 0, mouseDown = false, rightDown = false;
let pointerLocked = false;
window.addEventListener('keydown', e => keys[e.key.toLowerCase()] = true);
window.addEventListener('keyup', e => keys[e.key.toLowerCase()] = false);
window.addEventListener('mousemove', e => { mouseDX += e.movementX; });
canvas.addEventListener('mousedown', e => {
  if (!pointerLocked) { canvas.requestPointerLock?.(); return; }
  if (e.button === 0) mouseDown = true;
  if (e.button === 2) rightDown = true;
});
window.addEventListener('mouseup', e => { if (e.button === 0) mouseDown = false; if (e.button === 2) rightDown = false; });
window.addEventListener('contextmenu', e => e.preventDefault());
document.addEventListener('pointerlockchange', () => {
  pointerLocked = document.pointerLockElement === canvas;
  if (!pointerLocked) { mouseDown = false; rightDown = false; }
});

function resetInputState() {
  mouseDX = 0;
  mouseDown = false;
  rightDown = false;
  for (let key in keys) delete keys[key];
  mJoyId = null; mRJoyId = null; mRJoyDX = 0; mobileAutoSeq = 0;
  updateJoystickVisual(0, 0);
  updateRJoyVisual(0);
  let lb = document.getElementById('joystickBase'); if (lb) lb.style.display = 'none';
  let rb = document.getElementById('rJoyBase');     if (rb) rb.style.display = 'none';
}

window.addEventListener('blur', resetInputState);

// Game state
let player, enemies, projectiles, particles, stars, planets, powerups, allies;
let score, wave, waveTimer, waveEnemiesLeft, enemiesAlive, lives;
let gameRunning = false, gameOverActive = false;
let lastTime = 0, plasmaCD = 0, missileCD = 0;
let invincTimer = 0;
let shieldTimer = 0, spreadTimer = 0, empTimer = 0, homingTimer = 0;
let empWave = 0, empWaveMax = 0;
let plasmaEnergy = 100, plasmaMax = 100, plasmaRecharge = 15; // per second
let missileEnergy = 100, missileMax = 100, missileRecharge = 8; // per second
let plasmaCost = 5, missileCost = 20;
let camX = 0, camY = 0;
let shakeX = 0, shakeY = 0, shakeDur = 0;
let mJoyId = null, mJoyBX = 0, mJoyBY = 0;
let mRJoyId = null, mRJoyBX = 0, mRJoyDX = 0;
let mobileAutoSeq = 0;
const AUTOFIRE_ARC = 0.22; // ~12.5° — lead-shot must be within this arc to autofire
const RJOY_RATE    = 0.1;  // rad/s per pixel of right-joystick deflection

const STORAGE_KEYS = {
  leaderboard: 'sd_leaderboard',
  playerName: 'sd_playerName'
};

// Stars
function makeStars() {
  stars = [];
  for (let i = 0; i < 300; i++) {
    stars.push({
      x: Math.random() * 4000 - 2000,
      y: Math.random() * 4000 - 2000,
      size: Math.random() * 2 + 0.5,
      depth: Math.random() * 0.8 + 0.2,
      brightness: Math.random() * 155 + 100
    });
  }
}

function initGame() {
  resetInputState();
  player = { x: 0, y: 0, vx: 0, vy: 0, angle: -Math.PI/2, hp: 100, maxHp: 100, radius: 16 };
  enemies = []; projectiles = []; particles = []; powerups = []; allies = [];
  score = 0; wave = 0; waveTimer = 2; waveEnemiesLeft = 0; enemiesAlive = 0;
  lives = 3; invincTimer = 0;
  plasmaCD = 0; missileCD = 0;
  shieldTimer = 0; spreadTimer = 0; empTimer = 0; homingTimer = 0; empWave = 0; empWaveMax = 0;
  plasmaEnergy = plasmaMax; missileEnergy = missileMax;
  camX = 0; camY = 0;
  shakeX = 0; shakeY = 0; shakeDur = 0;
  makeStars();
  makePlanets();
  nextWave();
}

function makePlanets() {
  planets = [];
  // Asteroids — small, gray
  let asteroidColors = [
    { base: '#3a3a3a', accent: '#5a5a5a', glow: '#888' },
    { base: '#4a4440', accent: '#6a6460', glow: '#998' },
    { base: '#2e3030', accent: '#4e5050', glow: '#778' },
    { base: '#3f3833', accent: '#5f5853', glow: '#887' },
    { base: '#333638', accent: '#535658', glow: '#789' },
  ];
  let asteroidCount = 2 + Math.floor(Math.random() * 2);
  for (let i = 0; i < asteroidCount; i++) {
    let r = 150 + Math.random() * 250;
    let x, y, tooClose, tries = 0;
    do {
      x = (Math.random() - 0.5) * 3000;
      y = (Math.random() - 0.5) * 3000;
      tooClose = (x*x + y*y) < (r + 600) * (r + 600);
      for (let p of planets) {
        let ddx = x - p.x, ddy = y - p.y;
        if (Math.sqrt(ddx*ddx + ddy*ddy) < r + p.radius + 150) tooClose = true;
      }
    } while (tooClose && ++tries < 200);
    let c = asteroidColors[i % asteroidColors.length];
    let dz = r + Math.max(125, r * 0.25);
    let grad = ctx.createRadialGradient(x - r*0.3, y - r*0.3, r*0.1, x, y, r);
    grad.addColorStop(0, c.accent); grad.addColorStop(1, c.base);
    planets.push({ x, y, radius: r, mass: r * 80, gravParam: 600 * r / 275 * r * 80, dangerZone: dz, dangerMargin: dz - r, color: c.base, accent: c.accent, glow: c.glow, grad });
  }
  // Planets — huge, colorful
  let planetColors = [
    { base: '#a04020', accent: '#d06830', glow: '#f84' },
    { base: '#2060a0', accent: '#40a0e0', glow: '#4cf' },
    { base: '#208040', accent: '#40c060', glow: '#4f8' },
    { base: '#802080', accent: '#c040c0', glow: '#f4f' },
    { base: '#a08020', accent: '#e0c040', glow: '#fe4' },
  ];
  let planetCount = 1 + Math.floor(Math.random() * 2);
  for (let i = 0; i < planetCount; i++) {
    let r = 1500 + Math.random() * 2500;
    let x, y, tooClose, tries = 0;
    do {
      x = (Math.random() - 0.5) * 12000;
      y = (Math.random() - 0.5) * 12000;
      tooClose = (x*x + y*y) < (r + 600) * (r + 600);
      for (let p of planets) {
        let ddx = x - p.x, ddy = y - p.y;
        if (Math.sqrt(ddx*ddx + ddy*ddy) < r + p.radius + 500) tooClose = true;
      }
    } while (tooClose && ++tries < 200);
    let c = planetColors[i % planetColors.length];
    let dz = r + Math.max(125, r * 0.25);
    let grad = ctx.createRadialGradient(x - r*0.3, y - r*0.3, r*0.1, x, y, r);
    grad.addColorStop(0, c.accent); grad.addColorStop(1, c.base);
    planets.push({ x, y, radius: r, mass: r * 80, gravParam: 600 * r / 275 * r * 80, dangerZone: dz, dangerMargin: dz - r, color: c.base, accent: c.accent, glow: c.glow, grad });
  }
}

function nextWave() {
  wave++;
  let count = 3 + wave * 2;
  if (count > 30) count = 30;
  waveEnemiesLeft = count;
  enemiesAlive = 0;
  waveTimer = 1.5;
  // Occasionally spawn an ally (30% chance starting wave 2, max 2 alive)
  if (wave >= 2 && Math.random() < 0.3 && allies.length < 2) {
    spawnAlly();
  }
}

function safeSpawnPoint(baseDist) {
  for (let attempts = 0; attempts < 20; attempts++) {
    let angle = Math.random() * Math.PI * 2;
    let sx = player.x + Math.cos(angle) * baseDist;
    let sy = player.y + Math.sin(angle) * baseDist;
    let safe = true;
    for (let pl of planets) {
      let dx = sx - pl.x, dy = sy - pl.y;
      if (Math.sqrt(dx*dx + dy*dy) < pl.radius + 100) { safe = false; break; }
    }
    if (safe) return { x: sx, y: sy };
  }
  // Fallback — just pick the last attempt
  let angle = Math.random() * Math.PI * 2;
  return { x: player.x + Math.cos(angle) * baseDist, y: player.y + Math.sin(angle) * baseDist };
}

function spawnAlly() {
  let pos = safeSpawnPoint(Math.max(W, H) / viewZoom * 0.5 + 50);
  allies.push({
    x: pos.x, y: pos.y, vx: 0, vy: 0, angle: 0,
    hp: 60, maxHp: 60, radius: 14, speed: 180,
    shootCD: Math.random() * 0.75 + 0.25,
    preferDist: 200 + Math.random() * 80,
    orbitDir: Math.random() < 0.5 ? 1 : -1, orbitStrength: 1.0, turnSpeed: 5,
    weapon: { owner: 'ally', projectile: 'plasma', bulletSpeed: 600, range: 600, muzzle: 18, cdMin: 0.4, cdSpan: 0.2 },
    behavior: allyAI, exhaustColor: '#0af'
  });
}

function spawnEnemy() {
  let pos = safeSpawnPoint(Math.max(W, H) / viewZoom * 0.7 + 100);
  let diff = Math.min(wave, 20);
  let roll = Math.random();
  let type;
  if (wave < 3) {
    type = 'drone';
  } else if (wave < 5) {
    type = roll < 0.5 ? 'drone' : roll < 0.8 ? 'gunship' : 'kamikaze';
  } else {
    if (roll < 0.35) type = 'drone';
    else if (roll < 0.6) type = 'gunship';
    else if (roll < 0.85) type = 'bruiser';
    else type = 'kamikaze';
  }
  let def = ENEMY_DEFS[type];
  let hp = def.baseHp + diff * def.hpScale;
  let e = {
    x: pos.x, y: pos.y, vx: 0, vy: 0, angle: 0, type,
    radius: def.radius, shootCD: Math.random() * 2 + 1,
    hp, maxHp: hp, speed: def.baseSpeed + diff * def.speedScale,
    color: def.color, accent: def.accent, dmg: def.dmg, score: def.score,
    turnSpeed: def.turnSpeed, behavior: def.behavior,
    exhaustColor: def.exhaustColor, weapon: def.weapon,
  };
  if (type === 'drone') {
    e.attackState = 'charge';
    e.closeDist = 150 + Math.random() * 50;
    e.farDist   = 500 + Math.random() * 100;
    e.strafeDir = Math.random() < 0.5 ? 1 : -1;
  } else if (type === 'gunship' || type === 'bruiser') {
    e.preferDist    = def.preferDistBase + Math.random() * def.preferDistRand;
    e.orbitDir      = Math.random() < 0.5 ? 1 : -1;
    e.orbitStrength = def.orbitStrength;
  } else {
    e.preferDist = 0; e.orbitDir = 0;
  }
  enemies.push(e);
  enemiesAlive++;
}

function turnToward(current, target, rate, dt) {
  let diff = target - current;
  // Normalize to [-PI, PI]
  while (diff > Math.PI) diff -= Math.PI * 2;
  while (diff < -Math.PI) diff += Math.PI * 2;
  let maxTurn = rate * dt;
  if (Math.abs(diff) <= maxTurn) return target;
  return current + Math.sign(diff) * maxTurn;
}

function screenShake(dur) { shakeDur = Math.max(shakeDur, dur); }

function addParticle(particle) {
  if (particles.length >= MAX_PARTICLES) return false;
  particles.push(particle);
  return true;
}

function normalized(dx, dy, fallbackAngle) {
  let distSq = dx * dx + dy * dy;
  if (distSq < 0.000001) {
    return { nx: Math.cos(fallbackAngle), ny: Math.sin(fallbackAngle), dist: 0 };
  }
  let dist = Math.sqrt(distSq);
  return { nx: dx / dist, ny: dy / dist, dist };
}

function spawnParticles(x, y, color, count, speed) {
  let room = MAX_PARTICLES - particles.length;
  if (room <= 0) return;
  if (count > room) count = room;
  for (let i = 0; i < count; i++) {
    let a = Math.random() * Math.PI * 2;
    let s = Math.random() * speed;
    addParticle({ x, y, vx: Math.cos(a)*s, vy: Math.sin(a)*s, life: 0.5 + Math.random()*0.5, maxLife: 0.8, color, size: Math.random()*3+1 });
  }
}

function damagePlayer(amount) {
  if (invincTimer > 0 || shieldTimer > 0) return;
  player.hp -= amount;
  screenShake(0.1);
  if (player.hp <= 0) {
    lives--;
    spawnParticles(player.x, player.y, '#0ff', 30, 250);
    spawnParticles(player.x, player.y, '#fff', 15, 200);
    screenShake(0.3);
    sndExplosion(true);
    if (lives <= 0) { gameOver(); }
    else { player.hp = player.maxHp; player.vx = 0; player.vy = 0; invincTimer = 2.5; resetInputState(); }
  } else {
    sndHit(0.30);
  }
}

function handlePlanetCollision(obj, pl) {
  let dx = obj.x - pl.x, dy = obj.y - pl.y;
  let { nx, ny, dist } = normalized(dx, dy, obj.angle || 0);
  if (dist < pl.radius + obj.radius) {
    obj.x = pl.x + nx * (pl.radius + obj.radius);
    obj.y = pl.y + ny * (pl.radius + obj.radius);
    let impactSpeed = Math.abs(obj.vx * nx + obj.vy * ny);
    obj.vx = nx * impactSpeed * 0.5;
    obj.vy = ny * impactSpeed * 0.5;
    if (impactSpeed > 15) {
      let dmg = Math.max(3, Math.floor(impactSpeed * 0.15));
      obj.hp -= dmg;
      spawnParticles(obj.x, obj.y, pl.glow, obj === player ? 6 : 4, obj === player ? 80 : 60);
      sndImpact();
      if (obj.hp <= 0) return true;
    }
  }
  return false;
}

function spawnExhaust(obj, color) {
  if (particles.length >= MAX_PARTICLES) return;
  let ex = obj.x - Math.cos(obj.angle) * obj.radius;
  let ey = obj.y - Math.sin(obj.angle) * obj.radius;
  let spread = (Math.random() - 0.5) * 0.6;
  let a = obj.angle + Math.PI + spread;
  let s = 40 + Math.random() * 40;
  addParticle({ x: ex, y: ey, vx: Math.cos(a)*s + obj.vx*0.3, vy: Math.sin(a)*s + obj.vy*0.3, life: 0.2+Math.random()*0.15, maxLife: 0.35, color: color, size: 1.5+Math.random()*1.5 });
}

const PROJECTILE_DEFS = {
  plasma:       { speed: 600, dmg: 10, radius: 3, life: 2,   affectedByGravity: false, color: '#0ff' },
  missile:      { speed: 300, dmg: 35, radius: 5, life: 3,   affectedByGravity: true,  color: '#0f0' },
  enemyPlasma:  { speed: 350, dmg: 8,  radius: 3, life: 2.5, affectedByGravity: false, color: '#f84' },
  enemyMissile: { speed: 200, dmg: 25, radius: 5, life: 3,   affectedByGravity: true,  color: '#f0f' },
};

const POWERUP_DEFS = {
  health: { color: '#0f0', symbol: '+' },
  shield: { color: '#48f', symbol: 'S' },
  emp:    { color: '#ff0', symbol: 'E' },
  homing: { color: '#f60', symbol: 'H' },
  spread: { color: '#f0f', symbol: '*' },
};

const ENEMY_DEFS = {
  drone: {
    baseHp: 20, hpScale: 3, baseSpeed: 220, speedScale: 5,
    color: '#f44', accent: '#f88', dmg: 8, score: 100, radius: 12, turnSpeed: 6,
    weapon: { owner: 'enemy', projectile: 'enemyPlasma', bulletSpeed: 350, range: 800, muzzle: 20, cdMin: 0.4, cdSpan: 0.3 },
    behavior: droneAI, exhaustColor: '#f44',
  },
  gunship: {
    baseHp: 50, hpScale: 5, baseSpeed: 150, speedScale: 3,
    color: '#f80', accent: '#fc4', dmg: 12, score: 250, radius: 16, turnSpeed: 4,
    preferDistBase: 180, preferDistRand: 80, orbitStrength: 1.0,
    weapon: { owner: 'enemy', projectile: 'enemyPlasma', bulletSpeed: 350, range: 800, muzzle: 20, cdMin: 1.2, cdSpan: 0.5 },
    behavior: orbiterAI, exhaustColor: '#f80',
  },
  bruiser: {
    baseHp: 120, hpScale: 10, baseSpeed: 80, speedScale: 2,
    color: '#a0f', accent: '#c6f', dmg: 25, score: 500, radius: 22, turnSpeed: 3,
    preferDistBase: 320, preferDistRand: 100, orbitStrength: 0.6,
    weapon: { owner: 'enemy', projectile: 'enemyMissile', bulletSpeed: 200, range: 800, muzzle: 20, cdMin: 2, cdSpan: 1 },
    behavior: orbiterAI, exhaustColor: null,
  },
  kamikaze: {
    baseHp: 15, hpScale: 2, baseSpeed: 300, speedScale: 8,
    color: '#cf0', accent: '#ff0', dmg: 30, score: 150, radius: 10, turnSpeed: 1,
    behavior: kamikazeAI, exhaustColor: '#cf0',
  },
};

function fireProjectile(owner, x, y, angle, type, srcVx, srcVy, opts) {
  let def = PROJECTILE_DEFS[type];
  let sx = srcVx || 0, sy = srcVy || 0;
  let p = { x, y, angle, owner, type, ...def,
            vx: Math.cos(angle) * def.speed + sx,
            vy: Math.sin(angle) * def.speed + sy };
  if (type === 'plasma' && owner !== 'player') p.color = owner === 'ally' ? '#4f8' : '#f88';
  if (type === 'missile' && owner !== 'player') p.color = '#f0f';
  if (opts && opts.homing) { p.homing = true; p.color = '#f60'; p.turnRate = 3.5; }
  projectiles.push(p);
}

function leadShot(ex, ey, evx, evy, tx, ty, tvx, tvy, bulletSpeed) {
  let dx = tx - ex, dy = ty - ey;
  let dvx = tvx - evx, dvy = tvy - evy;
  let a = dvx*dvx + dvy*dvy - bulletSpeed*bulletSpeed;
  let b = 2*(dx*dvx + dy*dvy);
  let c = dx*dx + dy*dy;
  let disc = b*b - 4*a*c;
  if (Math.abs(a) < 0.001 || disc < 0) return Math.atan2(dy, dx);
  let t = (-b - Math.sqrt(disc)) / (2*a);
  if (t < 0) t = (-b + Math.sqrt(disc)) / (2*a);
  if (t < 0) return Math.atan2(dy, dx);
  t = Math.min(t, 2);
  return Math.atan2(dy + dvy*t, dx + dvx*t);
}

// Aim the ship at target (lead-shot) and fire if cooldown's up and in range.
// Caller picks the target (teams differ on who to shoot); the mechanics of
// aiming and firing don't. Weapon config (ship.weapon) is attached at spawn:
//   { owner, projectile, bulletSpeed, range, muzzle, cdMin, cdSpan }
function aimAndShoot(ship, target, dt) {
  let w = ship.weapon;
  let aim = leadShot(ship.x, ship.y, ship.vx, ship.vy,
                     target.x, target.y, target.vx || 0, target.vy || 0,
                     w.bulletSpeed);
  ship.angle = turnToward(ship.angle, aim, ship.turnSpeed, dt);
  ship.shootCD -= dt;
  let dx = target.x - ship.x, dy = target.y - ship.y;
  if (ship.shootCD > 0 || dx*dx + dy*dy > w.range * w.range) return;
  let fx = ship.x + Math.cos(ship.angle) * w.muzzle;
  let fy = ship.y + Math.sin(ship.angle) * w.muzzle;
  fireProjectile(w.owner, fx, fy, ship.angle, w.projectile, ship.vx, ship.vy);
  if (w.projectile === 'missile') sndMissileFire(); else sndPlasma(false);
  ship.shootCD = w.cdMin + Math.random() * w.cdSpan;
}

// Canonical four-axis thrust, applied in the ship's local frame. Every ship —
// player, enemy, ally — uses this. f in [-1,1] is forward/reverse (W = +1 ×1.0,
// S = -1 ×0.5). s in [-1,1] is strafe (D = +1 ×0.7, A = -1 ×0.7).
function thrustLocal(obj, f, s, accel) {
  if (f > 0) {
    obj.vx += Math.cos(obj.angle) * accel * f;
    obj.vy += Math.sin(obj.angle) * accel * f;
  } else if (f < 0) {
    obj.vx += Math.cos(obj.angle) * accel * f * 0.5;
    obj.vy += Math.sin(obj.angle) * accel * f * 0.5;
  }
  if (s !== 0) {
    let perp = obj.angle + Math.PI / 2;
    obj.vx += Math.cos(perp) * accel * s * 0.7;
    obj.vy += Math.sin(perp) * accel * s * 0.7;
  }
}

// AI helper: "thrust toward this world-space heading." Picks W or S from
// cos(delta), A or D from sin(delta), then applies via thrustLocal. Keeps AIs
// bound to the same four buttons the player has — no world-frame cheats.
function thrustToward(obj, heading, accel) {
  let delta = heading - obj.angle;
  while (delta > Math.PI) delta -= Math.PI * 2;
  while (delta < -Math.PI) delta += Math.PI * 2;
  let cf = Math.cos(delta), sf = Math.sin(delta);
  let f = Math.abs(cf) > 0.1 ? Math.sign(cf) : 0;
  let s = Math.abs(sf) > 0.1 ? Math.sign(sf) : 0;
  thrustLocal(obj, f, s, accel);
}

// Returns nonzero when avoidance is strong enough to suppress attack steering.
// Ship rotates its nose toward an escape heading (radial + tangential bias)
// and fires thrust using the player's W/S/A/D vocabulary. No world-frame cheats.
function avoidPlanets(obj, dt, navTarget) {
  let totalUrgency = 0;
  let escX = 0, escY = 0;
  for (let pl of planets) {
    let dx = obj.x - pl.x, dy = obj.y - pl.y;
    let distSq = dx*dx + dy*dy;
    if (distSq >= pl.dangerZone * pl.dangerZone) continue;
    let { nx, ny, dist } = normalized(dx, dy, obj.angle || 0);
    let urgency = (pl.dangerZone - dist) / pl.dangerMargin;
    urgency = urgency * urgency;
    if (urgency < 0.01) continue;
    // Tangent direction — curve toward navTarget if provided, else follow velocity
    let cross = navTarget
      ? nx * (navTarget.y - pl.y) - ny * (navTarget.x - pl.x)
      : obj.vx * ny - obj.vy * nx;
    let sign = cross >= 0 ? 1 : -1;
    // Escape vector: radial away + 60% tangential bias, scaled by urgency
    escX += (nx - ny * sign * 0.6) * urgency;
    escY += (ny + nx * sign * 0.6) * urgency;
    totalUrgency += urgency;
  }
  if (totalUrgency < 0.15) return 0;
  // Flip and burn: rotate nose toward escape heading, then thrust using the
  // same four axes the player has.
  let escAngle = Math.atan2(escY, escX);
  obj.angle = turnToward(obj.angle, escAngle, obj.turnSpeed, dt);
  thrustToward(obj, escAngle, obj.speed * dt * 2.0);
  return totalUrgency;
}

function applyGravity(obj, dt) {
  for (let pl of planets) {
    let dx = pl.x - obj.x, dy = pl.y - obj.y;
    let distSq = dx*dx + dy*dy;
    let dist = Math.sqrt(distSq);
    let minDist = pl.radius + (obj.radius || 3);
    if (dist < minDist) dist = minDist;
    let force = pl.gravParam / (dist * dist);
    obj.vx += (dx / dist) * force * dt;
    obj.vy += (dy / dist) * force * dt;
  }
}

function steerOrbit(obj, tx, ty, dist, dt) {
  let angle = Math.atan2(ty - obj.y, tx - obj.x);
  let radialForce = 0;
  if (dist > obj.preferDist + 40) radialForce = 1;
  else if (dist < obj.preferDist - 40) radialForce = -1.2;
  else radialForce = (dist - obj.preferDist) * 0.01;
  let perp = angle + Math.PI / 2 * obj.orbitDir;
  let accel = obj.speed * dt * 1.5;
  obj.vx += Math.cos(angle) * radialForce * accel;
  obj.vy += Math.sin(angle) * radialForce * accel;
  obj.vx += Math.cos(perp) * obj.orbitStrength * accel;
  obj.vy += Math.sin(perp) * obj.orbitStrength * accel;
}

function applyMovement(obj, avoiding, drag, dt) {
  let spd = Math.sqrt(obj.vx * obj.vx + obj.vy * obj.vy);
  if (!avoiding && spd > obj.speed) { obj.vx *= obj.speed / spd; obj.vy *= obj.speed / spd; }
  obj.vx *= drag; obj.vy *= drag;
  obj.x += obj.vx * dt; obj.y += obj.vy * dt;
  return spd;
}

function updatePhysics(dt) {
  applyGravity(player, dt);
  for (let e of enemies) applyGravity(e, dt);
  for (let a of allies) applyGravity(a, dt);
  for (let p of projectiles) {
    if (p.affectedByGravity) applyGravity(p, dt);
  }

  // Planet collisions
  for (let pl of planets) {
    // Player — save hp to detect damage, restore if invincible
    let hpBefore = player.hp;
    let playerDied = handlePlanetCollision(player, pl);
    if (invincTimer > 0 || shieldTimer > 0) {
      player.hp = hpBefore; // undo damage if protected
    } else if (playerDied) {
      lives--;
      spawnParticles(player.x, player.y, '#0ff', 30, 250);
      spawnParticles(player.x, player.y, '#fff', 15, 200);
      screenShake(0.3);
      if (lives <= 0) { gameOver(); } else { player.hp = player.maxHp; player.vx = 0; player.vy = 0; invincTimer = 2.5; resetInputState(); }
    }

    // Enemies
    for (let i = enemies.length - 1; i >= 0; i--) {
      let e = enemies[i];
      if (handlePlanetCollision(e, pl)) {
        score += e.score;
        spawnParticles(e.x, e.y, e.color, 20, 200);
        screenShake(0.1);
        sndExplosion(false);
        enemies.splice(i, 1);
        enemiesAlive--;
      }
    }

    // Allies
    for (let i = allies.length - 1; i >= 0; i--) {
      let a = allies[i];
      if (handlePlanetCollision(a, pl)) {
        spawnParticles(a.x, a.y, '#0ff', 20, 200);
        sndExplosion(false);
        allies.splice(i, 1);
      }
    }

    // Projectiles — destroy on planet hit
    for (let i = projectiles.length - 1; i >= 0; i--) {
      let p = projectiles[i];
      let pdx = p.x - pl.x, pdy = p.y - pl.y;
      if (pdx*pdx + pdy*pdy < (pl.radius + p.radius) * (pl.radius + p.radius)) {
        spawnParticles(p.x, p.y, p.color, 4, 60);
        projectiles.splice(i, 1);
      }
    }
  }
}

function updatePlayer(dt) {
  // Player rotation — mouse on desktop; right joystick applies a rate-based turn on mobile
  if (isMobile && mRJoyDX !== 0) player.angle += mRJoyDX * RJOY_RATE * dt;
  player.angle += mouseDX * 0.004;
  mouseDX = 0;

  // Player thrust — keys → (f, s) intent → shared local-frame thrust.
  let f = (keys['w'] ? 1 : 0) - (keys['s'] ? 1 : 0);
  let s = (keys['d'] ? 1 : 0) - (keys['a'] ? 1 : 0);
  thrustLocal(player, f, s, 300 * dt);
  let damp = Math.pow(0.99, dt * 60);
  player.vx *= damp; player.vy *= damp;
  player.x += player.vx * dt; player.y += player.vy * dt;

  // Engine sound — on when any thrust key active
  sndEngineUpdate(!!(keys['w'] || keys['s'] || keys['a'] || keys['d']));

  // Engine particles (player-specific: 2 particles with different timing/size)
  if (keys['w']) {
    let ex = player.x - Math.cos(player.angle)*18;
    let ey = player.y - Math.sin(player.angle)*18;
    for (let i = 0; i < 2; i++) {
      let spread = (Math.random()-0.5)*0.6;
      let a = player.angle + Math.PI + spread;
      let s = 80 + Math.random()*60;
      addParticle({ x: ex, y: ey, vx: Math.cos(a)*s + player.vx*0.3, vy: Math.sin(a)*s + player.vy*0.3, life: 0.3+Math.random()*0.2, maxLife: 0.5, color: '#0af', size: 2+Math.random()*2 });
    }
  }

  // Recharge ammo
  let plasmaRate = spreadTimer > 0 ? plasmaRecharge * 6 : plasmaRecharge;
  let missileRate = homingTimer > 0 ? missileRecharge * 2 : missileRecharge;
  plasmaEnergy = Math.min(plasmaMax, plasmaEnergy + plasmaRate * dt);
  missileEnergy = Math.min(missileMax, missileEnergy + missileRate * dt);

  // Slowly regenerate health
  player.hp = Math.min(player.maxHp, player.hp + 2 * dt);

  // Player shooting
  plasmaCD -= dt; missileCD -= dt;
  let pCost = spreadTimer > 0 ? plasmaCost * 3 : plasmaCost;
  if (mouseDown && plasmaCD <= 0 && plasmaEnergy >= pCost) {
    let fx = player.x + Math.cos(player.angle)*20;
    let fy = player.y + Math.sin(player.angle)*20;
    if (spreadTimer > 0) {
      fireProjectile('player', fx, fy, player.angle - 0.2, 'plasma', player.vx, player.vy);
      fireProjectile('player', fx, fy, player.angle, 'plasma', player.vx, player.vy);
      fireProjectile('player', fx, fy, player.angle + 0.2, 'plasma', player.vx, player.vy);
    } else {
      fireProjectile('player', fx, fy, player.angle, 'plasma', player.vx, player.vy);
    }
    plasmaEnergy -= pCost;
    plasmaCD = 0.15;
    sndPlasma(true);
  }
  if (rightDown && missileCD <= 0 && missileEnergy >= missileCost) {
    let fx = player.x + Math.cos(player.angle)*20;
    let fy = player.y + Math.sin(player.angle)*20;
    fireProjectile('player', fx, fy, player.angle, 'missile', player.vx, player.vy, { homing: homingTimer > 0 });
    missileEnergy -= missileCost;
    missileCD = 0.5;
    sndMissileFire();
  }

  // Mobile autofire: plasma → plasma → plasma → missile, repeat.
  // Uses leadShot to account for both ship and target velocity.
  if (isMobile && enemies.length > 0) {
    let useDef = mobileAutoSeq < 3 ? PROJECTILE_DEFS.plasma : PROJECTILE_DEFS.missile;
    let useSpeed = useDef.speed;
    let useRange = useDef.speed * useDef.life;
    let onTarget = false;
    for (let e of enemies) {
      let edx = e.x - player.x, edy = e.y - player.y;
      if (edx*edx + edy*edy > useRange * useRange) continue;
      let la = leadShot(player.x, player.y, player.vx, player.vy,
                        e.x, e.y, e.vx || 0, e.vy || 0, useSpeed);
      let d = la - player.angle;
      while (d >  Math.PI) d -= Math.PI * 2;
      while (d < -Math.PI) d += Math.PI * 2;
      if (Math.abs(d) < AUTOFIRE_ARC) { onTarget = true; break; }
    }
    if (onTarget) {
      let fx = player.x + Math.cos(player.angle) * 20;
      let fy = player.y + Math.sin(player.angle) * 20;
      let plasmaFireCost = spreadTimer > 0 ? plasmaCost * 3 : plasmaCost;
      let firePlasma = () => {
        if (spreadTimer > 0) {
          fireProjectile('player', fx, fy, player.angle - 0.2, 'plasma', player.vx, player.vy);
          fireProjectile('player', fx, fy, player.angle,       'plasma', player.vx, player.vy);
          fireProjectile('player', fx, fy, player.angle + 0.2, 'plasma', player.vx, player.vy);
        } else {
          fireProjectile('player', fx, fy, player.angle, 'plasma', player.vx, player.vy);
        }
        plasmaEnergy -= plasmaFireCost;
        plasmaCD = 0.15;
        sndPlasma(true);
      };
      if (mobileAutoSeq < 3) {
        if (plasmaCD <= 0 && plasmaEnergy >= plasmaFireCost) {
          firePlasma();
          mobileAutoSeq++;
        }
      } else {
        if (missileCD <= 0 && missileEnergy >= missileCost) {
          fireProjectile('player', fx, fy, player.angle, 'missile', player.vx, player.vy, { homing: homingTimer > 0 });
          missileEnergy -= missileCost;
          missileCD = 0.5;
          mobileAutoSeq = 0;
          sndMissileFire();
        } else if (plasmaCD <= 0 && plasmaEnergy >= plasmaFireCost) {
          firePlasma();
          mobileAutoSeq = 0;
        }
      }
    }
  }
}

// ---------- NPC behaviors ----------
// Each behavior is "what does this ship want to do this frame?" — it sets
// velocity/angle intent via the shared thrust helpers, and sets ship._avoiding
// so the outer loop knows whether to bypass the speed cap in applyMovement.
// The outer loop handles EMP, movement integration, and exhaust uniformly.

// Enemy target pick: player by default; coin-flip switch to a closer ally.
function pickEnemyShootTarget(e, distToPlayer) {
  let target = player;
  for (let a of allies) {
    let adx = a.x - e.x, ady = a.y - e.y;
    if (adx*adx + ady*ady < distToPlayer*distToPlayer && Math.random() < 0.5) target = a;
  }
  return target;
}

// Kamikaze: ram the player. No shooting.
function kamikazeAI(e, dt) {
  let dx = player.x - e.x, dy = player.y - e.y;
  e._avoiding = avoidPlanets(e, dt, player);
  if (e._avoiding) return;
  e.angle = turnToward(e.angle, Math.atan2(dy, dx), e.turnSpeed, dt);
  let accel = e.speed * dt * 2.5;
  e.vx += Math.cos(e.angle) * accel;
  e.vy += Math.sin(e.angle) * accel;
}

// Drone: strafing run — charge in, break past, extend out, loop back.
function droneAI(e, dt) {
  let dx = player.x - e.x, dy = player.y - e.y;
  let dist = Math.sqrt(dx*dx + dy*dy);
  let desiredAngle = Math.atan2(dy, dx);
  e._avoiding = avoidPlanets(e, dt, player);
  if (!e._avoiding) {
    let accel = e.speed * dt * 2.0;
    if (e.attackState === 'charge') {
      e.angle = turnToward(e.angle, desiredAngle, e.turnSpeed, dt);
      e.vx += Math.cos(e.angle) * accel;
      e.vy += Math.sin(e.angle) * accel;
      if (dist < e.closeDist) e.attackState = 'break';
    } else if (e.attackState === 'break') {
      // Full W/S/A/D vocabulary — just uses more buttons than charge.
      let away = desiredAngle + Math.PI + Math.PI / 4 * e.strafeDir;
      e.angle = turnToward(e.angle, away, e.turnSpeed, dt);
      thrustToward(e, away, accel);
      if (dx * e.vx + dy * e.vy < 0) e.attackState = 'extend';
    } else {
      // Extend — keep flying out, gradually straighten.
      let away = Math.atan2(-dy, -dx);
      e.angle = turnToward(e.angle, away, e.turnSpeed * 0.5, dt);
      e.vx += Math.cos(e.angle) * accel * 0.5;
      e.vy += Math.sin(e.angle) * accel * 0.5;
      if (dist > e.farDist) { e.attackState = 'charge'; e.strafeDir *= -1; }
    }
  }
  // Don't shoot while extending (flying away from player).
  if (e.attackState === 'extend') return;
  aimAndShoot(e, pickEnemyShootTarget(e, dist), dt);
}

// Gunship / bruiser: hold preferred distance, orbit, shoot. Same behavior —
// per-type parameters (preferDist, orbitStrength, weapon) do the differentiating.
function orbiterAI(e, dt) {
  let dx = player.x - e.x, dy = player.y - e.y;
  let dist = Math.sqrt(dx*dx + dy*dy);
  e._avoiding = avoidPlanets(e, dt, player);
  if (!e._avoiding) steerOrbit(e, player.x, player.y, dist, dt);
  // aimAndShoot handles all turning via lead-shot; no separate player-facing
  // turn here — two competing turnToward calls fight when orbital velocity is
  // high, causing the nose to stall between the two target angles.
  aimAndShoot(e, pickEnemyShootTarget(e, dist), dt);
}

// Ally: orbit and shoot nearest enemy; if no enemies, drift toward player.
function allyAI(a, dt) {
  let target = null, tDist = Infinity;
  for (let e of enemies) {
    let dx = e.x - a.x, dy = e.y - a.y;
    let d = Math.sqrt(dx*dx + dy*dy);
    if (d < tDist) { tDist = d; target = e; }
  }
  a._avoiding = avoidPlanets(a, dt, target || player);
  if (a._avoiding) return;
  if (target) {
    steerOrbit(a, target.x, target.y, tDist, dt);
    aimAndShoot(a, target, dt);
  } else {
    let dx = player.x - a.x, dy = player.y - a.y;
    a.angle = turnToward(a.angle, Math.atan2(dy, dx), a.turnSpeed, dt);
    let d = Math.sqrt(dx*dx + dy*dy);
    if (d > 150) {
      a.vx += (dx/d) * a.speed * dt;
      a.vy += (dy/d) * a.speed * dt;
    }
  }
}

// Unified NPC loop. Handles EMP drift, per-ship behavior, movement, exhaust —
// the parts every AI ship shares. Behavior-specific logic lives in ship.behavior.
function updateNPCs(dt) {
  let drag = Math.pow(0.98, dt * 60);
  for (let list of [enemies, allies]) {
    for (let s of list) {
      // EMP: no AI, no drag, just drift and spin.
      if (empTimer > 0) {
        s.angle += (s.spinRate || 0) * dt;
        s.x += s.vx * dt;
        s.y += s.vy * dt;
        continue;
      }
      s._avoiding = 0;
      s.behavior(s, dt);
      let spd = applyMovement(s, s._avoiding, drag, dt);
      if (spd > 30 && s.exhaustColor && Math.random() < 0.4) spawnExhaust(s, s.exhaustColor);
    }
  }
}

function updateProjectiles(dt) {
  for (let i = projectiles.length - 1; i >= 0; i--) {
    let p = projectiles[i];
    // Heat-seeking — turn toward nearest enemy and re-align velocity
    if (p.homing && enemies.length > 0) {
      let best = null, bestD = Infinity;
      for (let e of enemies) {
        let dx = e.x - p.x, dy = e.y - p.y;
        let d = dx*dx + dy*dy;
        if (d < bestD) { bestD = d; best = e; }
      }
      if (best) {
        let target = Math.atan2(best.y - p.y, best.x - p.x);
        p.angle = turnToward(p.angle, target, p.turnRate, dt);
        p.vx = Math.cos(p.angle) * p.speed;
        p.vy = Math.sin(p.angle) * p.speed;
      }
    }
    p.x += p.vx * dt; p.y += p.vy * dt;
    p.life -= dt;
    // Trail
    if (Math.random() < 0.5) {
      addParticle({ x: p.x, y: p.y, vx: (Math.random()-0.5)*20, vy: (Math.random()-0.5)*20, life: 0.15, maxLife: 0.2, color: p.color, size: p.radius*0.6 });
    }
    if (p.life <= 0) { projectiles.splice(i, 1); continue; }

    let hit = false;

    // Player & ally projectiles hit enemies
    if (p.owner === 'player' || p.owner === 'ally') {
      for (let j = enemies.length - 1; j >= 0; j--) {
        let e = enemies[j];
        let ddx = p.x - e.x, ddy = p.y - e.y;
        if (ddx*ddx + ddy*ddy < (p.radius + e.radius) * (p.radius + e.radius)) {
          e.hp -= p.dmg;
          spawnParticles(p.x, p.y, e.color, 5, 100);
          projectiles.splice(i, 1); hit = true;
          sndHit(0.15);
          if (e.hp <= 0) {
            if (p.owner === 'player') score += e.score;
            spawnParticles(e.x, e.y, e.color, 20, 200);
            spawnParticles(e.x, e.y, '#ff0', 10, 150);
            screenShake(0.15);
            sndExplosion(false);
            if (Math.random() < 0.2) {
              let types = ['health', 'shield', 'spread', 'emp', 'homing'];
              let t = types[Math.floor(Math.random() * types.length)];
              powerups.push({ x: e.x, y: e.y, vx: 0, vy: 0, type: t, life: 15, radius: 12 });
            }
            enemies.splice(j, 1);
            enemiesAlive--;
          }
          break;
        }
      }
    }
    if (hit) continue;

    // Player projectiles can friendly-fire allies
    if (p.owner === 'player') {
      for (let j = allies.length - 1; j >= 0; j--) {
        let a = allies[j];
        let ddx = p.x - a.x, ddy = p.y - a.y;
        if (ddx*ddx + ddy*ddy < (p.radius + a.radius) * (p.radius + a.radius)) {
          a.hp -= p.dmg;
          spawnParticles(p.x, p.y, '#0af', 5, 80);
          projectiles.splice(i, 1); hit = true;
          if (a.hp <= 0) {
            spawnParticles(a.x, a.y, '#0ff', 20, 200);
            sndExplosion(false);
            allies.splice(j, 1);
          }
          break;
        }
      }
    }
    if (hit) continue;

    // Enemy & ally projectiles hit player (friendly fire from allies too)
    if ((p.owner === 'enemy' || p.owner === 'ally') && invincTimer <= 0) {
      let ddx = p.x - player.x, ddy = p.y - player.y;
      if (ddx*ddx + ddy*ddy < (p.radius + player.radius) * (p.radius + player.radius)) {
        if (shieldTimer > 0) {
          spawnParticles(p.x, p.y, '#48f', 6, 100);
          projectiles.splice(i, 1);
          continue;
        }
        spawnParticles(p.x, p.y, '#0ff', 8, 120);
        projectiles.splice(i, 1); hit = true;
        damagePlayer(p.dmg);
      }
    }
    if (hit) continue;

    // Enemy projectiles hit allies
    if (p.owner === 'enemy') {
      for (let j = allies.length - 1; j >= 0; j--) {
        let a = allies[j];
        let ddx = p.x - a.x, ddy = p.y - a.y;
        if (ddx*ddx + ddy*ddy < (p.radius + a.radius) * (p.radius + a.radius)) {
          a.hp -= p.dmg;
          spawnParticles(p.x, p.y, '#0af', 5, 80);
          projectiles.splice(i, 1); hit = true;
          if (a.hp <= 0) {
            spawnParticles(a.x, a.y, '#0ff', 20, 200);
            sndExplosion(false);
            allies.splice(j, 1);
          }
          break;
        }
      }
    }
  }
}

function updateCollisions(dt) {
  // Enemy-player collision
  for (let j = enemies.length - 1; j >= 0; j--) {
    let e = enemies[j];
    let ddx = e.x - player.x, ddy = e.y - player.y;
    if (ddx*ddx + ddy*ddy < (e.radius + player.radius) * (e.radius + player.radius)) {
      if (e.type === 'kamikaze') {
        // Kamikaze explodes on contact — big damage, self-destructs
        spawnParticles(e.x, e.y, '#cf0', 25, 250);
        spawnParticles(e.x, e.y, '#ff0', 15, 180);
        screenShake(0.3);
        damagePlayer(e.dmg);
        score += e.score;
        enemies.splice(j, 1);
        enemiesAlive--;
        continue;
      }
      if (invincTimer <= 0 && shieldTimer <= 0) {
        spawnParticles(player.x, player.y, '#0ff', 8, 100);
        screenShake(0.15);
        damagePlayer(15);
      }
      // Push enemy away
      let pushA = Math.atan2(ddy, ddx);
      e.vx += Math.cos(pushA) * 200;
      e.vy += Math.sin(pushA) * 200;
    }
  }

  // Ally-player collision
  for (let i = allies.length - 1; i >= 0; i--) {
    let a = allies[i];
    let ddx = a.x - player.x, ddy = a.y - player.y;
    let { nx, ny, dist } = normalized(ddx, ddy, a.angle || 0);
    if (dist < a.radius + player.radius) {
      // Push apart
      a.x = player.x + nx * (a.radius + player.radius);
      a.y = player.y + ny * (a.radius + player.radius);
      let impactSpeed = Math.abs((player.vx - a.vx) * nx + (player.vy - a.vy) * ny);
      // Bounce
      a.vx += nx * impactSpeed * 0.5;
      a.vy += ny * impactSpeed * 0.5;
      player.vx -= nx * impactSpeed * 0.3;
      player.vy -= ny * impactSpeed * 0.3;
      if (impactSpeed > 30) {
        let dmg = Math.max(2, Math.floor(impactSpeed * 0.08));
        a.hp -= dmg;
        spawnParticles(a.x, a.y, '#0c6', 4, 60);
        if (a.hp <= 0) { spawnParticles(a.x, a.y, '#0ff', 20, 200); sndExplosion(false); allies.splice(i, 1); }
        damagePlayer(dmg);
      }
    }
  }

  // Ally-enemy collision
  for (let i = allies.length - 1; i >= 0; i--) {
    let a = allies[i];
    let allyDead = false;
    for (let j = enemies.length - 1; j >= 0; j--) {
      let e = enemies[j];
      let ddx = a.x - e.x, ddy = a.y - e.y;
      let { nx, ny, dist } = normalized(ddx, ddy, a.angle || 0);
      if (dist < a.radius + e.radius) {
        if (e.type === 'kamikaze') {
          // Kamikaze explodes on ally contact too
          spawnParticles(e.x, e.y, '#cf0', 25, 250);
          spawnParticles(e.x, e.y, '#ff0', 15, 180);
          screenShake(0.2);
          a.hp -= e.dmg;
          score += e.score;
          enemies.splice(j, 1);
          enemiesAlive--;
          if (a.hp <= 0) { spawnParticles(a.x, a.y, '#0ff', 20, 200); sndExplosion(false); allies.splice(i, 1); allyDead = true; }
          if (allyDead) break;
          continue;
        }
        a.x = e.x + nx * (a.radius + e.radius);
        a.y = e.y + ny * (a.radius + e.radius);
        let impactSpeed = Math.abs((e.vx - a.vx) * nx + (e.vy - a.vy) * ny);
        a.vx += nx * impactSpeed * 0.5;
        a.vy += ny * impactSpeed * 0.5;
        e.vx -= nx * impactSpeed * 0.5;
        e.vy -= ny * impactSpeed * 0.5;
        a.hp -= 10;
        e.hp -= 10;
        spawnParticles((a.x+e.x)/2, (a.y+e.y)/2, '#ff0', 6, 80);
        if (a.hp <= 0) { spawnParticles(a.x, a.y, '#0ff', 20, 200); sndExplosion(false); allies.splice(i, 1); allyDead = true; }
        if (e.hp <= 0) {
          score += e.score;
          spawnParticles(e.x, e.y, e.color, 20, 200);
          screenShake(0.1);
          enemies.splice(j, 1);
          enemiesAlive--;
        }
        if (allyDead) break;
      }
    }
  }
}

function updatePowerups(dt) {
  // Powerup timers
  if (shieldTimer > 0) shieldTimer -= dt;
  if (spreadTimer > 0) spreadTimer -= dt;
  if (empTimer > 0) empTimer -= dt;
  if (homingTimer > 0) homingTimer -= dt;

  // Powerups — pickup and expire
  for (let i = powerups.length - 1; i >= 0; i--) {
    let pu = powerups[i];
    pu.life -= dt;
    if (pu.life <= 0) { powerups.splice(i, 1); continue; }
    let dx = player.x - pu.x, dy = player.y - pu.y;
    let distSq = dx*dx + dy*dy;
    let { nx, ny } = normalized(dx, dy, player.angle || 0);
    // Powerups gravitate toward player
    let force = 5000000 / (distSq + 500);
    pu.vx += nx * force * dt;
    pu.vy += ny * force * dt;
    let damp = Math.pow(0.97, dt * 60);
    pu.vx *= damp;
    pu.vy *= damp;
    pu.x += pu.vx * dt;
    pu.y += pu.vy * dt;
    dx = player.x - pu.x; dy = player.y - pu.y;
    distSq = dx*dx + dy*dy;
    if (distSq < (player.radius + pu.radius) * (player.radius + pu.radius)) {
      if (pu.type === 'health') {
        player.hp = Math.min(player.maxHp, player.hp + 40);
        spawnParticles(pu.x, pu.y, '#0f0', 10, 80);
        sndPickup('health');
      } else if (pu.type === 'shield') {
        shieldTimer = 8;
        spawnParticles(pu.x, pu.y, '#48f', 10, 80);
        sndPickup('shield');
      } else if (pu.type === 'spread') {
        spreadTimer = 10;
        spawnParticles(pu.x, pu.y, '#f0f', 10, 80);
        sndPickup('spread');
      } else if (pu.type === 'homing') {
        homingTimer = 12;
        spawnParticles(pu.x, pu.y, '#f60', 10, 80);
        sndPickup('homing');
      } else if (pu.type === 'emp') {
        empTimer = 6;
        // Assign random spin to all enemies and allies
        for (let e of enemies) e.spinRate = (Math.random() - 0.5) * 8;
        for (let a of allies) a.spinRate = (Math.random() - 0.5) * 8;
        spawnParticles(player.x, player.y, '#ff0', 30, 200);
        spawnParticles(player.x, player.y, '#fff', 15, 150);
        screenShake(0.4);
        sndEMP();
        empWave = 0; empWaveMax = 2000;
      }
      powerups.splice(i, 1);
    }
  }
}

function updateParticles(dt) {
  for (let i = particles.length - 1; i >= 0; i--) {
    let p = particles[i];
    p.x += p.vx * dt; p.y += p.vy * dt;
    p.life -= dt;
    if (p.life <= 0) particles.splice(i, 1);
  }
}

function update(dt) {
  if (!gameRunning) return;
  if (invincTimer > 0) invincTimer -= dt;
  updatePhysics(dt);
  updatePlayer(dt);

  // Wave spawning
  if (waveEnemiesLeft > 0) {
    waveTimer -= dt;
    if (waveTimer <= 0) {
      spawnEnemy();
      waveEnemiesLeft--;
      waveTimer = Math.max(0.6, 3.0 - wave * 0.1);
    }
  } else if (enemiesAlive <= 0) {
    score += wave * 200;
    nextWave();
  }

  updateNPCs(dt);
  updateProjectiles(dt);
  updateCollisions(dt);
  updatePowerups(dt);
  updateParticles(dt);

  // EMP shockwave expansion
  if (empWave < empWaveMax) {
    empWave += 1000 * dt;
    if (empWave > empWaveMax) empWave = empWaveMax;
  }

  // Camera
  camX = player.x; camY = player.y;
  if (shakeDur > 0) {
    shakeX = (Math.random()-0.5) * 8; shakeY = (Math.random()-0.5) * 8;
    shakeDur -= dt;
  } else { shakeX = 0; shakeY = 0; }
}

function drawShip(x, y, angle, color, accent, radius, hp, maxHp, isPlayer, showHpBar, type) {
  ctx.save();
  ctx.translate(x, y);
  ctx.rotate(angle);

  // Glow
  glow(6, color);

  if (isPlayer) {
    // Player ship — sleek arrow
    ctx.fillStyle = '#112';
    ctx.beginPath();
    ctx.moveTo(radius * 1.3, 0);
    ctx.lineTo(-radius * 0.9, -radius * 0.8);
    ctx.lineTo(-radius * 0.4, 0);
    ctx.lineTo(-radius * 0.9, radius * 0.8);
    ctx.closePath();
    ctx.fill();
    ctx.strokeStyle = color;
    ctx.lineWidth = 2;
    ctx.stroke();
    // Accent lines
    ctx.strokeStyle = accent;
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.moveTo(radius * 0.8, 0);
    ctx.lineTo(-radius * 0.2, -radius * 0.45);
    ctx.moveTo(radius * 0.8, 0);
    ctx.lineTo(-radius * 0.2, radius * 0.45);
    ctx.stroke();
    // Cockpit
    ctx.fillStyle = accent;
    ctx.beginPath();
    ctx.arc(radius * 0.3, 0, 3, 0, Math.PI*2);
    ctx.fill();
  } else {
    // Enemy ships
    ctx.fillStyle = '#111';
    if (radius > 18) {
      // Bruiser — hexagonal
      ctx.beginPath();
      for (let i = 0; i < 6; i++) {
        let a = i * Math.PI/3;
        ctx.lineTo(Math.cos(a)*radius, Math.sin(a)*radius);
      }
      ctx.closePath();
      ctx.fill();
      ctx.strokeStyle = color;
      ctx.lineWidth = 2.5;
      ctx.stroke();
      ctx.strokeStyle = accent;
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.arc(0, 0, radius*0.5, 0, Math.PI*2);
      ctx.stroke();
    } else if (radius > 14) {
      // Gunship — diamond-ish
      ctx.beginPath();
      ctx.moveTo(radius*1.1, 0);
      ctx.lineTo(0, -radius*0.7);
      ctx.lineTo(-radius*0.8, -radius*0.5);
      ctx.lineTo(-radius*0.6, 0);
      ctx.lineTo(-radius*0.8, radius*0.5);
      ctx.lineTo(0, radius*0.7);
      ctx.closePath();
      ctx.fill();
      ctx.strokeStyle = color;
      ctx.lineWidth = 2;
      ctx.stroke();
      // Wing accents
      ctx.strokeStyle = accent;
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(radius*0.5, -radius*0.2);
      ctx.lineTo(-radius*0.3, -radius*0.45);
      ctx.moveTo(radius*0.5, radius*0.2);
      ctx.lineTo(-radius*0.3, radius*0.45);
      ctx.stroke();
    } else if (type === 'kamikaze') {
      // Kamikaze — sharp dart/wedge
      ctx.beginPath();
      ctx.moveTo(radius*1.6, 0);
      ctx.lineTo(-radius*0.5, -radius*0.6);
      ctx.lineTo(-radius*0.2, 0);
      ctx.lineTo(-radius*0.5, radius*0.6);
      ctx.closePath();
      ctx.fill();
      ctx.strokeStyle = color;
      ctx.lineWidth = 2;
      ctx.stroke();
      // Danger stripes
      ctx.strokeStyle = accent;
      ctx.lineWidth = 1.5;
      ctx.beginPath();
      ctx.moveTo(radius*0.8, 0);
      ctx.lineTo(radius*0.1, -radius*0.35);
      ctx.moveTo(radius*0.8, 0);
      ctx.lineTo(radius*0.1, radius*0.35);
      ctx.stroke();
    } else {
      // Drone — small triangle
      ctx.beginPath();
      ctx.moveTo(radius, 0);
      ctx.lineTo(-radius*0.7, -radius*0.7);
      ctx.lineTo(-radius*0.3, 0);
      ctx.lineTo(-radius*0.7, radius*0.7);
      ctx.closePath();
      ctx.fill();
      ctx.strokeStyle = color;
      ctx.lineWidth = 1.5;
      ctx.stroke();
    }
    // Core dot
    ctx.fillStyle = accent;
    ctx.beginPath();
    ctx.arc(0, 0, 2, 0, Math.PI*2);
    ctx.fill();
  }
  glow(0);
  ctx.restore();

  // HP bar (non-player ships)
  if (showHpBar && hp < maxHp) {
    let bw = radius * 2;
    let bx = x - bw/2, by = y - radius - 10;
    ctx.fillStyle = '#333';
    ctx.fillRect(bx, by, bw, 3);
    ctx.fillStyle = color;
    ctx.fillRect(bx, by, bw * (hp/maxHp), 3);
  }
}

function draw() {
  ctx.fillStyle = '#080810';
  ctx.fillRect(0, 0, W, H);

  if (!player) return;

  // Stars (parallax) — screen space, unaffected by world zoom
  for (let s of stars) {
    let sx = ((s.x - camX * s.depth) % 2000 + 3000) % 2000 - 1000 + W/2;
    let sy = ((s.y - camY * s.depth) % 2000 + 3000) % 2000 - 1000 + H/2;
    ctx.fillStyle = `rgba(${s.brightness},${s.brightness},${Math.min(255,s.brightness+50)},${0.5+s.depth*0.5})`;
    ctx.fillRect(sx + shakeX, sy + shakeY, s.size, s.size);
  }

  ctx.save();
  ctx.translate(W/2 + shakeX, H/2 + shakeY);
  ctx.scale(viewZoom, viewZoom);
  ctx.translate(-camX, -camY);

  // Planets
  for (let pl of planets) {
    // Glow
    glow(20, pl.glow);
    // Body
    ctx.fillStyle = pl.grad;
    ctx.beginPath();
    ctx.arc(pl.x, pl.y, pl.radius, 0, Math.PI*2);
    ctx.fill();
    // Outline
    ctx.strokeStyle = pl.glow;
    ctx.lineWidth = 1.5;
    ctx.stroke();
    glow(0);
    // Surface detail — a couple of darker patches
    ctx.fillStyle = 'rgba(0,0,0,0.2)';
    ctx.beginPath();
    ctx.arc(pl.x + pl.radius*0.25, pl.y + pl.radius*0.15, pl.radius*0.3, 0, Math.PI*2);
    ctx.fill();
    ctx.beginPath();
    ctx.arc(pl.x - pl.radius*0.3, pl.y - pl.radius*0.25, pl.radius*0.18, 0, Math.PI*2);
    ctx.fill();
  }

  // Particles
  for (let p of particles) {
    let alpha = Math.max(0, p.life / p.maxLife);
    ctx.globalAlpha = alpha;
    ctx.fillStyle = p.color;
    ctx.fillRect(p.x - p.size/2, p.y - p.size/2, p.size, p.size);
  }
  ctx.globalAlpha = 1;

  // Projectiles
  for (let p of projectiles) {
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.radius, 0, Math.PI*2);
    ctx.fill();
    if (p.radius >= 5) {
      glow(4, p.color);
      // Missile — draw a tail
      ctx.strokeStyle = p.color;
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(p.x, p.y);
      ctx.lineTo(p.x - Math.cos(p.angle)*12, p.y - Math.sin(p.angle)*12);
      ctx.stroke();
    }
  }
  glow(0);

  // Powerups
  for (let pu of powerups) {
    let bob = Math.sin(Date.now() * 0.005) * 3;
    let { color: col, symbol } = POWERUP_DEFS[pu.type];
    // Fading when about to expire
    ctx.globalAlpha = pu.life < 3 ? 0.3 + 0.7 * (pu.life / 3) : 1;
    glow(6, col);
    ctx.strokeStyle = col;
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.arc(pu.x, pu.y + bob, pu.radius, 0, Math.PI * 2);
    ctx.stroke();
    ctx.fillStyle = col;
    ctx.font = 'bold 14px Courier New';
    ctx.textAlign = 'center';
    ctx.fillText(symbol, pu.x, pu.y + bob + 5);
    ctx.textAlign = 'left';
  }
  ctx.globalAlpha = 1;
  glow(0);

  // Enemies
  for (let e of enemies) {
    drawShip(e.x, e.y, e.angle, e.color, e.accent, e.radius, e.hp, e.maxHp, false, true, e.type);
  }

  // Allies — same ship style as player, green tint
  for (let a of allies) {
    drawShip(a.x, a.y, a.angle, '#0c6', '#4f8', a.radius, a.hp, a.maxHp, true, true);
  }

  // Player
  if (invincTimer > 0 && Math.floor(invincTimer * 10) % 2 === 0) {
    // Blink
  } else {
    drawShip(player.x, player.y, player.angle, '#0cf', '#4ef', player.radius, player.hp, player.maxHp, true, false);
  }

  // Shield effect around player
  if (shieldTimer > 0) {
    let alpha = shieldTimer < 2 ? shieldTimer / 2 : 0.6;
    ctx.globalAlpha = alpha;
    ctx.strokeStyle = '#48f';
    glow(20, '#48f');
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.arc(player.x, player.y, player.radius + 8, 0, Math.PI * 2);
    ctx.stroke();
    ctx.globalAlpha = 1;
    glow(0);
  }

  // EMP shockwave ring
  if (empWave > 0 && empWave < empWaveMax) {
    let progress = empWave / empWaveMax;
    let alpha = 1 - progress;
    ctx.globalAlpha = alpha * 0.8;
    ctx.strokeStyle = '#ff0';
    glow(15, '#ff0');
    ctx.lineWidth = 4 * (1 - progress) + 1;
    ctx.beginPath();
    ctx.arc(player.x, player.y, empWave, 0, Math.PI * 2);
    ctx.stroke();
    // Inner brighter ring
    ctx.globalAlpha = alpha * 0.4;
    ctx.strokeStyle = '#fff';
    ctx.lineWidth = 2 * (1 - progress);
    ctx.beginPath();
    ctx.arc(player.x, player.y, empWave * 0.95, 0, Math.PI * 2);
    ctx.stroke();
    ctx.globalAlpha = 1;
    glow(0);
  }

  ctx.restore();

  // HUD
  drawHUD();
}

function drawBar(x, y, w, h, pct, color, label, labelColor) {
  let pad = h > 10 ? 2 : 1;
  ctx.fillStyle = '#1118';
  ctx.fillRect(x - pad, y - pad, w + pad*2, h + pad*2);
  ctx.fillStyle = '#222';
  ctx.fillRect(x, y, w, h);
  ctx.fillStyle = color;
  glow(h > 10 ? 8 : 6, color);
  ctx.fillRect(x, y, w * pct, h);
  glow(0);
  ctx.fillStyle = labelColor || color;
  ctx.font = (h > 10 ? 12 : 10) + 'px Courier New';
  ctx.fillText(label, x + w + 8, y + h - (h > 10 ? 3 : 0));
}

function drawHUD() {
  let barW = 200, barX = 20, barY = 20;

  // Health bar
  let hpPct = player.hp / player.maxHp;
  let hpColor = hpPct > 0.5 ? '#0f0' : hpPct > 0.25 ? '#ff0' : '#f00';
  drawBar(barX, barY, barW, 16, hpPct, hpColor, 'HP', '#fff');

  // Plasma energy bar
  let ammoBarY = barY + 20;
  drawBar(barX, ammoBarY, barW, 8, plasmaEnergy / plasmaMax, '#0ff', 'PLASMA');

  // Missile energy bar
  let missBarY = ammoBarY + 11;
  drawBar(barX, missBarY, barW, 8, missileEnergy / missileMax, '#0f0', 'MISSILE');

  // Lives
  ctx.fillStyle = '#0ff';
  glow(6, '#0ff');
  ctx.font = '16px Courier New';
  ctx.fillText('LIVES: ' + lives, barX, missBarY + 8 + 18);
  glow(0);

  // Score + Wave — top centre
  ctx.textAlign = 'center';
  ctx.fillStyle = '#ff0';
  glow(6, '#ff0');
  ctx.font = '20px Courier New';
  ctx.fillText('SCORE: ' + score, W / 2, 34);
  glow(0);
  ctx.fillStyle = '#0f0';
  glow(6, '#0f0');
  ctx.font = '16px Courier New';
  ctx.fillText('WAVE ' + wave, W / 2, 56);
  glow(0);
  ctx.textAlign = 'left';

  // Active powerup indicators
  let puY = missBarY + 8 + 36;
  ctx.font = '14px Courier New';
  for (let [timer, key] of [
    [shieldTimer, 'shield'], [spreadTimer, 'spread'],
    [empTimer,    'emp'],    [homingTimer, 'homing'],
  ]) {
    if (timer <= 0) continue;
    let { color } = POWERUP_DEFS[key];
    ctx.fillStyle = color;
    glow(6, color);
    ctx.fillText(key.toUpperCase() + ' ' + Math.ceil(timer) + 's', barX, puY);
    glow(0);
    puY += 18;
  }

  // Radar
  let radarR = 80;
  let radarX = W - radarR - 20;
  let radarY = radarR + 20;
  let radarRange = 3000; // world units visible on radar

  // Background
  ctx.save();
  ctx.beginPath();
  ctx.arc(radarX, radarY, radarR, 0, Math.PI * 2);
  ctx.clip();
  ctx.fillStyle = 'rgba(0,4,12,0.7)';
  ctx.fill();

  // Range rings
  ctx.strokeStyle = 'rgba(0,255,255,0.08)';
  ctx.lineWidth = 1;
  for (let r = 1; r <= 3; r++) {
    ctx.beginPath();
    ctx.arc(radarX, radarY, radarR * r / 3, 0, Math.PI * 2);
    ctx.stroke();
  }

  // Crosshair lines
  ctx.strokeStyle = 'rgba(0,255,255,0.06)';
  ctx.beginPath();
  ctx.moveTo(radarX - radarR, radarY);
  ctx.lineTo(radarX + radarR, radarY);
  ctx.moveTo(radarX, radarY - radarR);
  ctx.lineTo(radarX, radarY + radarR);
  ctx.stroke();

  // Helper to plot a blip
  function blip(wx, wy, color, size) {
    let dx = (wx - player.x) / radarRange * radarR;
    let dy = (wy - player.y) / radarRange * radarR;
    let dist = Math.sqrt(dx * dx + dy * dy);
    if (dist > radarR - 2) {
      // Clamp to edge
      dx = dx / dist * (radarR - 2);
      dy = dy / dist * (radarR - 2);
    }
    ctx.fillStyle = color;
    ctx.fillRect(radarX + dx - size / 2, radarY + dy - size / 2, size, size);
  }

  // Planets
  for (let pl of planets) {
    let dx = (pl.x - player.x) / radarRange * radarR;
    let dy = (pl.y - player.y) / radarRange * radarR;
    let pr = Math.max(2, pl.radius / radarRange * radarR);
    ctx.fillStyle = 'rgba(255,255,255,0.1)';
    ctx.beginPath();
    ctx.arc(radarX + dx, radarY + dy, pr, 0, Math.PI * 2);
    ctx.fill();
  }

  // Enemies
  for (let e of enemies) blip(e.x, e.y, e.color, 3);
  // Allies
  for (let a of allies) blip(a.x, a.y, '#0c6', 3);
  // Powerups
  for (let pu of powerups) {
    let col = POWERUP_DEFS[pu.type].color;
    blip(pu.x, pu.y, col, 2);
  }

  // Player (center dot)
  ctx.fillStyle = '#0ff';
  ctx.fillRect(radarX - 1.5, radarY - 1.5, 3, 3);

  // Player facing line
  ctx.strokeStyle = '#0ff';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(radarX, radarY);
  ctx.lineTo(radarX + Math.cos(player.angle) * 10, radarY + Math.sin(player.angle) * 10);
  ctx.stroke();

  ctx.restore();

  // Border ring (outside clip)
  ctx.strokeStyle = 'rgba(0,255,255,0.3)';
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.arc(radarX, radarY, radarR, 0, Math.PI * 2);
  ctx.stroke();
}

function gameOver() {
  gameRunning = false;
  gameOverActive = true;
  resetInputState();
  sndEngineUpdate(false);
  showMobileControls(false);
  setTimeout(() => document.exitPointerLock?.(), 0);
  document.getElementById('finalScore').textContent = 'Score: ' + score;
  document.getElementById('finalWave').textContent = 'Wave Reached: ' + wave;
  // Only show name input and save button if score qualifies for top 5
  let lb = readLeaderboard();
  lb.sort((a,b) => b.score - a.score);
  let qualifies = score > 0 && (lb.length < 5 || score > lb[lb.length - 1].score);
  document.getElementById('nameInput').style.display = qualifies ? '' : 'none';
  document.getElementById('submitScore').style.display = qualifies ? '' : 'none';
  if (qualifies) {
    document.getElementById('nameInput').value = readSavedPlayerName();
  }
  document.getElementById('gameOver').classList.add('active');
  showLeaderboard();
}

function readLeaderboard() {
  try {
    let lb = JSON.parse(localStorage.getItem(STORAGE_KEYS.leaderboard) || '[]');
    return Array.isArray(lb) ? lb : [];
  } catch {
    return [];
  }
}

function saveLeaderboard(lb) {
  try {
    localStorage.setItem(STORAGE_KEYS.leaderboard, JSON.stringify(lb));
  } catch {}
}

function readSavedPlayerName() {
  try {
    return localStorage.getItem(STORAGE_KEYS.playerName) || '';
  } catch {
    return '';
  }
}

function savePlayerName(name) {
  try {
    localStorage.setItem(STORAGE_KEYS.playerName, name);
  } catch {}
}

function showLeaderboard() {
  let lb = readLeaderboard();
  let html = '<h2>TOP SCORES</h2>';
  lb.sort((a,b) => b.score - a.score);
  lb.slice(0, 5).forEach((e, i) => {
    html += `<div class="lb-entry${i===0?' gold':''}">${i+1}. ${e.name} — ${e.score} (Wave ${e.wave})</div>`;
  });
  if (lb.length === 0) html += '<div class="lb-entry">No scores yet</div>';
  document.getElementById('leaderboard').innerHTML = html;
}

document.getElementById('submitScore').addEventListener('click', () => {
  let name = document.getElementById('nameInput').value.trim() || 'ACE';
  savePlayerName(name);
  let lb = readLeaderboard();
  lb.push({ name, score, wave });
  lb.sort((a,b) => b.score - a.score);
  if (lb.length > 5) lb.length = 5;
  saveLeaderboard(lb);
  showLeaderboard();
  document.getElementById('submitScore').disabled = true;
  document.getElementById('submitScore').textContent = 'SAVED';
});

document.getElementById('restartBtn').addEventListener('click', () => {
  _initAudio();
  document.getElementById('gameOver').classList.remove('active');
  document.getElementById('submitScore').disabled = false;
  document.getElementById('submitScore').textContent = 'SAVE SCORE';
  document.getElementById('nameInput').value = readSavedPlayerName();
  gameOverActive = false;
  initGame();
  showMobileControls(true);
  gameRunning = true;
});

document.getElementById('startBtn').addEventListener('click', () => {
  _initAudio();
  document.getElementById('startScreen').classList.add('hidden');
  initGame();
  showMobileControls(true);
  gameRunning = true;
});

function updateJoystickVisual(dx, dy) {
  let stick = document.getElementById('joystickStick');
  if (stick) stick.style.transform = `translate(calc(-50% + ${dx}px), calc(-50% + ${dy}px))`;
}

function updateRJoyVisual(dx) {
  let stick = document.getElementById('rJoyStick');
  if (stick) stick.style.transform = `translate(calc(-50% + ${dx}px), -50%)`;
}

function showMobileControls(show) {
  if (!isMobile) return;
  if (!show) {
    document.getElementById('joystickBase').style.display = 'none';
    document.getElementById('rJoyBase').style.display = 'none';
  }
}

function mobileSetup() {
  if (!isMobile) return;
  canvas.style.touchAction = 'none';
  const JOY_L = 55; // left joystick max radius
  const JOY_R = 35; // right joystick max horizontal deflection
  window.addEventListener('touchstart', e => {
    _initAudio();
    if (!gameRunning) return;
    for (let t of e.changedTouches) {
      let x = t.clientX, y = t.clientY;
      if (mJoyId === null && x < W * 0.4) {
        mJoyId = t.identifier;
        mJoyBX = x; mJoyBY = y;
        let base = document.getElementById('joystickBase');
        base.style.left = (x - 60) + 'px';
        base.style.top  = (y - 60) + 'px';
        base.style.bottom = 'auto';
        base.style.display = 'block';
        updateJoystickVisual(0, 0);
      } else if (mRJoyId === null && x > W * 0.6) {
        mRJoyId = t.identifier;
        mRJoyBX = x;
        mRJoyDX = 0;
        let base = document.getElementById('rJoyBase');
        base.style.left   = (x - 60) + 'px';
        base.style.top    = (t.clientY - 30) + 'px';
        base.style.bottom = 'auto';
        base.style.display = 'block';
        updateRJoyVisual(0);
      }
    }
  }, { passive: true });

  window.addEventListener('touchmove', e => {
    if (!gameRunning) return;
    e.preventDefault();
    for (let t of e.changedTouches) {
      let x = t.clientX, y = t.clientY;
      // Re-adopt a still-pressed finger whose ID was cleared by resetInputState on respawn
      if (mJoyId === null && x < W * 0.4) {
        mJoyId = t.identifier;
        mJoyBX = x; mJoyBY = y;
        let base = document.getElementById('joystickBase');
        base.style.left = (x - 60) + 'px';
        base.style.top  = (y - 60) + 'px';
        base.style.bottom = 'auto';
        base.style.display = 'block';
        updateJoystickVisual(0, 0);
      } else if (mRJoyId === null && x > W * 0.6) {
        mRJoyId = t.identifier;
        mRJoyBX = x;
        mRJoyDX = 0;
        let base = document.getElementById('rJoyBase');
        base.style.left   = (x - 60) + 'px';
        base.style.top    = (y - 30) + 'px';
        base.style.bottom = 'auto';
        base.style.display = 'block';
        updateRJoyVisual(0);
      }
      if (t.identifier === mJoyId) {
        let dx = t.clientX - mJoyBX, dy = t.clientY - mJoyBY;
        let len = Math.sqrt(dx*dx + dy*dy);
        if (len > JOY_L) { dx = dx/len*JOY_L; dy = dy/len*JOY_L; }
        updateJoystickVisual(dx, dy);
        let thr = JOY_L * 0.25;
        keys['w'] = dy < -thr;
        keys['s'] = dy >  thr;
        keys['a'] = dx < -thr;
        keys['d'] = dx >  thr;
      } else if (t.identifier === mRJoyId) {
        let dx = t.clientX - mRJoyBX;
        if (dx >  JOY_R) dx =  JOY_R;
        if (dx < -JOY_R) dx = -JOY_R;
        mRJoyDX = dx;
        updateRJoyVisual(dx);
      }
    }
  }, { passive: false });

  function endTouch(e) {
    if (!gameRunning) {
      document.getElementById('joystickBase').style.display = 'none';
      document.getElementById('rJoyBase').style.display = 'none';
      return;
    }
    for (let t of e.changedTouches) {
      if (t.identifier === mJoyId) {
        mJoyId = null;
        keys['w'] = keys['s'] = keys['a'] = keys['d'] = false;
        updateJoystickVisual(0, 0);
        document.getElementById('joystickBase').style.display = 'none';
      } else if (t.identifier === mRJoyId) {
        mRJoyId = null;
        mRJoyDX = 0;
        updateRJoyVisual(0);
        document.getElementById('rJoyBase').style.display = 'none';
      }
    }
  }
  window.addEventListener('touchend',    endTouch, { passive: true });
  window.addEventListener('touchcancel', endTouch, { passive: true });

  let ctrl = document.querySelector('#startScreen .controls');
  if (ctrl) ctrl.innerHTML =
    '<span>Left thumb</span> — Thrust joystick<br>' +
    '<span>Right thumb</span> — Rotate (long joystick, left/right)<br>' +
    '<span>Autofire</span> — Plasma + missile auto-fire when enemy is on lead heading';
}

function loop(time) {
  let dt = Math.min((time - lastTime) / 1000, 0.05);
  lastTime = time;
  update(dt);
  draw();
  requestAnimationFrame(loop);
}
mobileSetup();
requestAnimationFrame(t => { lastTime = t; requestAnimationFrame(loop); });
</script>
</body>
</html>
