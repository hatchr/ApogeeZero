<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Apogee Zero</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #000; overflow: hidden; cursor: crosshair; font-family: 'Courier New', monospace; }
canvas { display: block; }
#gameOver {
  display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  background: rgba(0,0,0,0.85); z-index: 10;
  flex-direction: column; align-items: center; justify-content: center;
}
#gameOver.active { display: flex; }
#gameOver h1 { color: #f44; font-size: 48px; text-shadow: 0 0 20px #f44; margin-bottom: 20px; }
#gameOver .stats { color: #0ff; font-size: 22px; margin: 8px 0; text-shadow: 0 0 10px #0ff; }
#gameOver .leaderboard { margin-top: 20px; color: #fff; font-size: 16px; }
#gameOver .leaderboard h2 { color: #ff0; font-size: 24px; text-shadow: 0 0 10px #ff0; margin-bottom: 10px; }
#gameOver .lb-entry { margin: 4px 0; color: #aef; }
#gameOver .lb-entry.gold { color: #ff0; }
#nameInput {
  background: transparent; border: 2px solid #0ff; color: #0ff; font-family: inherit;
  font-size: 20px; padding: 8px 16px; margin: 15px 0; text-align: center; outline: none;
}
#nameInput::placeholder { color: #066; }
#submitScore {
  background: transparent; border: 2px solid #0f0; color: #0f0; font-family: inherit;
  font-size: 18px; padding: 8px 24px; cursor: pointer; margin: 5px;
}
#submitScore:hover { background: #0f02; }
#restartBtn {
  background: transparent; border: 2px solid #0ff; color: #0ff; font-family: inherit;
  font-size: 18px; padding: 8px 24px; cursor: pointer; margin: 5px;
}
#restartBtn:hover { background: #0ff2; }
#startScreen {
  position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  background: rgba(0,0,0,0.9); z-index: 10;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
}
#startScreen.hidden { display: none; }
#startScreen h1 { color: #0ff; font-size: 56px; text-shadow: 0 0 30px #0ff; margin-bottom: 10px; }
#startScreen .sub { color: #88f; font-size: 18px; margin-bottom: 30px; }
#startScreen .controls { color: #aaa; font-size: 14px; line-height: 2; margin-bottom: 30px; text-align: center; }
#startScreen .controls span { color: #0ff; }
#startBtn {
  background: transparent; border: 2px solid #0ff; color: #0ff; font-family: inherit;
  font-size: 24px; padding: 12px 40px; cursor: pointer;
}
#startBtn:hover { background: #0ff2; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="startScreen">
  <h1>APOGEE ZERO</h1>
  <div class="sub">Endless Survival</div>
  <div class="controls">
    <span>W A S D</span> — Thrust<br>
    <span>Mouse</span> — Aim (left/right to rotate)<br>
    <span>Left Click</span> — Plasma Bolt<br>
    <span>Right Click</span> — Missile<br>
  </div>
  <button id="startBtn">START GAME</button>
</div>
<div id="gameOver">
  <h1>GAME OVER</h1>
  <div class="stats" id="finalScore"></div>
  <div class="stats" id="finalWave"></div>
  <input type="text" id="nameInput" placeholder="Enter your name" maxlength="12">
  <div>
    <button id="submitScore">SAVE SCORE</button>
    <button id="restartBtn">PLAY AGAIN</button>
  </div>
  <div class="leaderboard" id="leaderboard"></div>
</div>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let W, H;
function resize() { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
resize();
window.addEventListener('resize', resize);

// Input
const keys = {};
let mouseDX = 0, mouseDown = false, rightDown = false;
let pointerLocked = false;
window.addEventListener('keydown', e => keys[e.key.toLowerCase()] = true);
window.addEventListener('keyup', e => keys[e.key.toLowerCase()] = false);
window.addEventListener('mousemove', e => { mouseDX += e.movementX; });
canvas.addEventListener('mousedown', e => {
  if (!pointerLocked) { canvas.requestPointerLock(); return; }
  if (e.button === 0) mouseDown = true;
  if (e.button === 2) rightDown = true;
});
window.addEventListener('mouseup', e => { if (e.button === 0) mouseDown = false; if (e.button === 2) rightDown = false; });
window.addEventListener('contextmenu', e => e.preventDefault());
document.addEventListener('pointerlockchange', () => {
  pointerLocked = document.pointerLockElement === canvas;
  if (!pointerLocked) { mouseDown = false; rightDown = false; }
});

// Game state
let player, enemies, projectiles, particles, stars, planets, powerups, allies;
let score, wave, waveTimer, waveEnemiesLeft, enemiesAlive, lives;
let gameRunning = false, gameOverActive = false;
let lastTime = 0, plasmaCD = 0, missileCD = 0;
let invincTimer = 0;
let shieldTimer = 0, spreadTimer = 0;
let plasmaEnergy = 100, plasmaMax = 100, plasmaRecharge = 15; // per second
let missileEnergy = 100, missileMax = 100, missileRecharge = 8; // per second
let plasmaCost = 5, missileCost = 20;
let camX = 0, camY = 0;
let shakeX = 0, shakeY = 0, shakeDur = 0;

// Stars
function makeStars() {
  stars = [];
  for (let i = 0; i < 300; i++) {
    stars.push({
      x: Math.random() * 4000 - 2000,
      y: Math.random() * 4000 - 2000,
      size: Math.random() * 2 + 0.5,
      depth: Math.random() * 0.8 + 0.2,
      brightness: Math.random() * 155 + 100
    });
  }
}

function initGame() {
  player = { x: 0, y: 0, vx: 0, vy: 0, angle: -Math.PI/2, hp: 100, maxHp: 100, radius: 16 };
  enemies = []; projectiles = []; particles = []; powerups = []; allies = [];
  score = 0; wave = 0; waveTimer = 2; waveEnemiesLeft = 0; enemiesAlive = 0;
  lives = 3; invincTimer = 0;
  plasmaCD = 0; missileCD = 0;
  shieldTimer = 0; spreadTimer = 0;
  plasmaEnergy = plasmaMax; missileEnergy = missileMax;
  camX = 0; camY = 0;
  shakeX = 0; shakeY = 0; shakeDur = 0;
  makeStars();
  makePlanets();
  nextWave();
}

function makePlanets() {
  planets = [];
  // Asteroids — small, gray
  let asteroidColors = [
    { base: '#3a3a3a', accent: '#5a5a5a', glow: '#888' },
    { base: '#4a4440', accent: '#6a6460', glow: '#998' },
    { base: '#2e3030', accent: '#4e5050', glow: '#778' },
    { base: '#3f3833', accent: '#5f5853', glow: '#887' },
    { base: '#333638', accent: '#535658', glow: '#789' },
  ];
  let asteroidCount = 2 + Math.floor(Math.random() * 2);
  for (let i = 0; i < asteroidCount; i++) {
    let r = 150 + Math.random() * 250;
    let x, y, tooClose, tries = 0;
    do {
      x = (Math.random() - 0.5) * 3000;
      y = (Math.random() - 0.5) * 3000;
      tooClose = (x*x + y*y) < 400*400;
      for (let p of planets) {
        let ddx = x - p.x, ddy = y - p.y;
        if (Math.sqrt(ddx*ddx + ddy*ddy) < r + p.radius + 150) tooClose = true;
      }
    } while (tooClose && ++tries < 200);
    let c = asteroidColors[i % asteroidColors.length];
    planets.push({ x, y, radius: r, mass: r * 80, color: c.base, accent: c.accent, glow: c.glow });
  }
  // Planets — huge, colorful
  let planetColors = [
    { base: '#a04020', accent: '#d06830', glow: '#f84' },
    { base: '#2060a0', accent: '#40a0e0', glow: '#4cf' },
    { base: '#208040', accent: '#40c060', glow: '#4f8' },
    { base: '#802080', accent: '#c040c0', glow: '#f4f' },
    { base: '#a08020', accent: '#e0c040', glow: '#fe4' },
  ];
  let planetCount = 1 + Math.floor(Math.random() * 2);
  for (let i = 0; i < planetCount; i++) {
    let r = 1500 + Math.random() * 2500;
    let x, y, tooClose, tries = 0;
    do {
      x = (Math.random() - 0.5) * 12000;
      y = (Math.random() - 0.5) * 12000;
      tooClose = (x*x + y*y) < (r + 600) * (r + 600);
      for (let p of planets) {
        let ddx = x - p.x, ddy = y - p.y;
        if (Math.sqrt(ddx*ddx + ddy*ddy) < r + p.radius + 500) tooClose = true;
      }
    } while (tooClose && ++tries < 200);
    let c = planetColors[i % planetColors.length];
    planets.push({ x, y, radius: r, mass: r * 80, color: c.base, accent: c.accent, glow: c.glow });
  }
}

function nextWave() {
  wave++;
  let count = 3 + wave * 2;
  if (count > 30) count = 30;
  waveEnemiesLeft = count;
  enemiesAlive = 0;
  waveTimer = 1.5;
  // Occasionally spawn an ally (30% chance starting wave 2, max 2 alive)
  if (wave >= 2 && Math.random() < 0.3 && allies.length < 2) {
    spawnAlly();
  }
}

function safeSpawnPoint(baseDist) {
  for (let attempts = 0; attempts < 20; attempts++) {
    let angle = Math.random() * Math.PI * 2;
    let sx = player.x + Math.cos(angle) * baseDist;
    let sy = player.y + Math.sin(angle) * baseDist;
    let safe = true;
    for (let pl of planets) {
      let dx = sx - pl.x, dy = sy - pl.y;
      if (Math.sqrt(dx*dx + dy*dy) < pl.radius + 100) { safe = false; break; }
    }
    if (safe) return { x: sx, y: sy };
  }
  // Fallback — just pick the last attempt
  let angle = Math.random() * Math.PI * 2;
  return { x: player.x + Math.cos(angle) * baseDist, y: player.y + Math.sin(angle) * baseDist };
}

function spawnAlly() {
  let pos = safeSpawnPoint(Math.max(W, H) * 0.5 + 50);
  allies.push({
    x: pos.x, y: pos.y, vx: 0, vy: 0, angle: 0,
    hp: 60, maxHp: 60, radius: 14, speed: 180,
    shootCD: Math.random() * 1.5 + 0.5,
    preferDist: 200 + Math.random() * 80,
    orbitDir: Math.random() < 0.5 ? 1 : -1
  });
}

function spawnEnemy() {
  let pos = safeSpawnPoint(Math.max(W, H) * 0.7 + 100);
  let diff = Math.min(wave, 20);
  let roll = Math.random();
  let type;
  if (wave < 3) {
    type = 'drone';
  } else if (wave < 5) {
    type = roll < 0.5 ? 'drone' : roll < 0.8 ? 'gunship' : 'kamikaze';
  } else {
    if (roll < 0.35) type = 'drone';
    else if (roll < 0.6) type = 'gunship';
    else if (roll < 0.85) type = 'bruiser';
    else type = 'kamikaze';
  }
  let e = { x: pos.x, y: pos.y, vx: 0, vy: 0, angle: 0, type, radius: 14, shootCD: Math.random() * 2 + 1 };
  if (type === 'drone') {
    e.hp = 20 + diff * 3; e.maxHp = e.hp; e.speed = 220 + diff * 5; e.color = '#f44'; e.accent = '#f88'; e.dmg = 8; e.score = 100; e.radius = 12;
    e.preferDist = 180 + Math.random() * 80;
    e.orbitDir = Math.random() < 0.5 ? 1 : -1;
  } else if (type === 'gunship') {
    e.hp = 50 + diff * 5; e.maxHp = e.hp; e.speed = 150 + diff * 3; e.color = '#f80'; e.accent = '#fc4'; e.dmg = 12; e.score = 250; e.radius = 16;
    e.preferDist = 280 + Math.random() * 120;
    e.orbitDir = Math.random() < 0.5 ? 1 : -1;
  } else if (type === 'bruiser') {
    e.hp = 120 + diff * 10; e.maxHp = e.hp; e.speed = 80 + diff * 2; e.color = '#a0f'; e.accent = '#c6f'; e.dmg = 25; e.score = 500; e.radius = 22;
    e.preferDist = 320 + Math.random() * 100;
    e.orbitDir = Math.random() < 0.5 ? 1 : -1;
  } else {
    // Kamikaze — fast, fragile, charges and explodes on contact
    e.hp = 15 + diff * 2; e.maxHp = e.hp; e.speed = 300 + diff * 8; e.color = '#cf0'; e.accent = '#ff0'; e.dmg = 30; e.score = 150; e.radius = 10;
    e.preferDist = 0;
    e.orbitDir = 0;
  }
  enemies.push(e);
  enemiesAlive++;
}

function screenShake(dur) { shakeDur = Math.max(shakeDur, dur); }

function spawnParticles(x, y, color, count, speed) {
  for (let i = 0; i < count; i++) {
    let a = Math.random() * Math.PI * 2;
    let s = Math.random() * speed;
    particles.push({ x, y, vx: Math.cos(a)*s, vy: Math.sin(a)*s, life: 0.5 + Math.random()*0.5, maxLife: 0.8, color, size: Math.random()*3+1 });
  }
}

function damagePlayer(amount) {
  if (invincTimer > 0 || shieldTimer > 0) return;
  player.hp -= amount;
  screenShake(0.1);
  if (player.hp <= 0) {
    lives--;
    spawnParticles(player.x, player.y, '#0ff', 30, 250);
    spawnParticles(player.x, player.y, '#fff', 15, 200);
    screenShake(0.3);
    if (lives <= 0) { gameOver(); }
    else { player.hp = player.maxHp; player.vx = 0; player.vy = 0; invincTimer = 2.5; }
  }
}

function handlePlanetCollision(obj, pl) {
  let dx = obj.x - pl.x, dy = obj.y - pl.y;
  let dist = Math.sqrt(dx*dx + dy*dy);
  if (dist < pl.radius + obj.radius) {
    let nx = dx/dist, ny = dy/dist;
    obj.x = pl.x + nx * (pl.radius + obj.radius);
    obj.y = pl.y + ny * (pl.radius + obj.radius);
    let impactSpeed = Math.abs(obj.vx * nx + obj.vy * ny);
    obj.vx = nx * impactSpeed * 0.5;
    obj.vy = ny * impactSpeed * 0.5;
    if (impactSpeed > 15) {
      let dmg = Math.max(3, Math.floor(impactSpeed * 0.15));
      obj.hp -= dmg;
      spawnParticles(obj.x, obj.y, pl.glow, obj === player ? 6 : 4, obj === player ? 80 : 60);
      if (obj.hp <= 0) return true;
    }
  }
  return false;
}

function spawnExhaust(obj, color) {
  let ex = obj.x - Math.cos(obj.angle) * obj.radius;
  let ey = obj.y - Math.sin(obj.angle) * obj.radius;
  let spread = (Math.random() - 0.5) * 0.6;
  let a = obj.angle + Math.PI + spread;
  let s = 40 + Math.random() * 40;
  particles.push({ x: ex, y: ey, vx: Math.cos(a)*s + obj.vx*0.3, vy: Math.sin(a)*s + obj.vy*0.3, life: 0.2+Math.random()*0.15, maxLife: 0.35, color: color, size: 1.5+Math.random()*1.5 });
}

function fireProjectile(owner, x, y, angle, type) {
  let p = { x, y, angle, owner, type };
  if (type === 'plasma') {
    p.speed = 600; p.vx = Math.cos(angle)*p.speed; p.vy = Math.sin(angle)*p.speed;
    p.dmg = 10; p.radius = 3; p.life = 2; p.color = owner === 'enemy' ? '#f88' : owner === 'ally' ? '#4f8' : '#0ff';
    p.affectedByGravity = false;
  } else if (type === 'missile') {
    p.speed = 300; p.vx = Math.cos(angle)*p.speed; p.vy = Math.sin(angle)*p.speed;
    p.dmg = 35; p.radius = 5; p.life = 3; p.color = owner === 'player' ? '#0f0' : '#f0f';
    p.affectedByGravity = true;
  } else if (type === 'enemyPlasma') {
    p.speed = 350; p.vx = Math.cos(angle)*p.speed; p.vy = Math.sin(angle)*p.speed;
    p.dmg = 8; p.radius = 3; p.life = 2.5; p.color = '#f84';
    p.affectedByGravity = false;
  } else if (type === 'enemyMissile') {
    p.speed = 200; p.vx = Math.cos(angle)*p.speed; p.vy = Math.sin(angle)*p.speed;
    p.dmg = 25; p.radius = 5; p.life = 3; p.color = '#f0f';
    p.affectedByGravity = true;
  }
  projectiles.push(p);
}

function leadShot(ex, ey, evx, evy, tx, ty, tvx, tvy, bulletSpeed) {
  let dx = tx - ex, dy = ty - ey;
  let dvx = tvx - evx, dvy = tvy - evy;
  let a = dvx*dvx + dvy*dvy - bulletSpeed*bulletSpeed;
  let b = 2*(dx*dvx + dy*dvy);
  let c = dx*dx + dy*dy;
  let disc = b*b - 4*a*c;
  if (Math.abs(a) < 0.001 || disc < 0) return Math.atan2(dy, dx);
  let t = (-b - Math.sqrt(disc)) / (2*a);
  if (t < 0) t = (-b + Math.sqrt(disc)) / (2*a);
  if (t < 0) return Math.atan2(dy, dx);
  t = Math.min(t, 2);
  return Math.atan2(dy + dvy*t, dx + dvx*t);
}

// Returns the avoidance force applied (0 if none) so callers can boost speed cap
function avoidPlanets(obj, dt) {
  let totalForce = 0;
  for (let pl of planets) {
    let dx = obj.x - pl.x, dy = obj.y - pl.y;
    let dist = Math.sqrt(dx*dx + dy*dy);
    let dangerZone = pl.radius + Math.max(250, pl.radius * 0.3);
    if (dist < dangerZone) {
      let scaledG = 600 * (pl.radius / 275);
      let gravForce = scaledG * pl.mass / (dist * dist);
      let urgency = (dangerZone - dist) / dangerZone;
      urgency = urgency * urgency;
      let avoidForce = (gravForce + obj.speed * 2) * urgency;
      let nx = dx / dist, ny = dy / dist;
      // Push away from planet
      obj.vx += nx * avoidForce * dt;
      obj.vy += ny * avoidForce * dt;
      // Tangential push so entities curve around instead of bouncing back.
      // Use velocity dot normal to pick the tangent direction.
      let dot = obj.vx * nx + obj.vy * ny;
      if (dot < 0) { // heading toward planet
        let cross = obj.vx * ny - obj.vy * nx;
        let sign = cross >= 0 ? 1 : -1;
        let tx = -ny * sign, ty = nx * sign;
        obj.vx += tx * avoidForce * 0.6 * dt;
        obj.vy += ty * avoidForce * 0.6 * dt;
      }
      totalForce += avoidForce * urgency;
    }
  }
  return totalForce;
}

function updatePhysics(dt) {
  // Gravity from planets — apply to player, enemies, allies, and gravity-affected projectiles
  function applyGravity(obj) {
    for (let pl of planets) {
      let dx = pl.x - obj.x, dy = pl.y - obj.y;
      let distSq = dx*dx + dy*dy;
      let dist = Math.sqrt(distSq);
      let minDist = pl.radius + (obj.radius || 3);
      if (dist < minDist) dist = minDist;
      let scaledG = 600 * (pl.radius / 275);
      let force = scaledG * pl.mass / (dist * dist);
      let ax = (dx / dist) * force;
      let ay = (dy / dist) * force;
      obj.vx += ax * dt;
      obj.vy += ay * dt;
    }
  }
  applyGravity(player);
  for (let e of enemies) applyGravity(e);
  for (let a of allies) applyGravity(a);
  for (let p of projectiles) {
    if (p.affectedByGravity) applyGravity(p);
  }

  // Planet collisions
  for (let pl of planets) {
    // Player — save hp to detect damage, restore if invincible
    let hpBefore = player.hp;
    let playerDied = handlePlanetCollision(player, pl);
    if (invincTimer > 0 || shieldTimer > 0) {
      player.hp = hpBefore; // undo damage if protected
    } else if (playerDied) {
      lives--;
      spawnParticles(player.x, player.y, '#0ff', 30, 250);
      spawnParticles(player.x, player.y, '#fff', 15, 200);
      screenShake(0.3);
      if (lives <= 0) { gameOver(); } else { player.hp = player.maxHp; player.vx = 0; player.vy = 0; invincTimer = 2.5; }
    }

    // Enemies
    for (let i = enemies.length - 1; i >= 0; i--) {
      let e = enemies[i];
      if (handlePlanetCollision(e, pl)) {
        score += e.score;
        spawnParticles(e.x, e.y, e.color, 20, 200);
        screenShake(0.1);
        enemies.splice(i, 1);
        enemiesAlive--;
      }
    }

    // Allies
    for (let i = allies.length - 1; i >= 0; i--) {
      let a = allies[i];
      if (handlePlanetCollision(a, pl)) {
        spawnParticles(a.x, a.y, '#0ff', 20, 200);
        allies.splice(i, 1);
      }
    }

    // Projectiles — destroy on planet hit
    for (let i = projectiles.length - 1; i >= 0; i--) {
      let p = projectiles[i];
      let pdx = p.x - pl.x, pdy = p.y - pl.y;
      if (pdx*pdx + pdy*pdy < (pl.radius + p.radius) * (pl.radius + p.radius)) {
        spawnParticles(p.x, p.y, p.color, 4, 60);
        projectiles.splice(i, 1);
      }
    }
  }
}

function updatePlayer(dt) {
  // Player rotation — relative mouse movement, immediate response
  player.angle += mouseDX * 0.004;
  mouseDX = 0;

  // Player thrust
  let thrust = 300;
  let ax = 0, ay = 0;
  if (keys['w']) { ax += Math.cos(player.angle) * thrust; ay += Math.sin(player.angle) * thrust; }
  if (keys['s']) { ax -= Math.cos(player.angle) * thrust * 0.5; ay -= Math.sin(player.angle) * thrust * 0.5; }
  if (keys['a']) { ax += Math.cos(player.angle - Math.PI/2) * thrust * 0.7; ay += Math.sin(player.angle - Math.PI/2) * thrust * 0.7; }
  if (keys['d']) { ax += Math.cos(player.angle + Math.PI/2) * thrust * 0.7; ay += Math.sin(player.angle + Math.PI/2) * thrust * 0.7; }
  player.vx += ax * dt; player.vy += ay * dt;
  let damp = Math.pow(0.98, dt * 60);
  player.vx *= damp; player.vy *= damp;
  player.x += player.vx * dt; player.y += player.vy * dt;

  // Engine particles (player-specific: 2 particles with different timing/size)
  if (keys['w']) {
    let ex = player.x - Math.cos(player.angle)*18;
    let ey = player.y - Math.sin(player.angle)*18;
    for (let i = 0; i < 2; i++) {
      let spread = (Math.random()-0.5)*0.6;
      let a = player.angle + Math.PI + spread;
      let s = 80 + Math.random()*60;
      particles.push({ x: ex, y: ey, vx: Math.cos(a)*s + player.vx*0.3, vy: Math.sin(a)*s + player.vy*0.3, life: 0.3+Math.random()*0.2, maxLife: 0.5, color: '#0af', size: 2+Math.random()*2 });
    }
  }

  // Recharge ammo
  let plasmaRate = spreadTimer > 0 ? plasmaRecharge * 6 : plasmaRecharge;
  plasmaEnergy = Math.min(plasmaMax, plasmaEnergy + plasmaRate * dt);
  missileEnergy = Math.min(missileMax, missileEnergy + missileRecharge * dt);

  // Player shooting
  plasmaCD -= dt; missileCD -= dt;
  let pCost = spreadTimer > 0 ? plasmaCost * 3 : plasmaCost;
  if (mouseDown && plasmaCD <= 0 && plasmaEnergy >= pCost) {
    let fx = player.x + Math.cos(player.angle)*20;
    let fy = player.y + Math.sin(player.angle)*20;
    if (spreadTimer > 0) {
      fireProjectile('player', fx, fy, player.angle - 0.2, 'plasma');
      fireProjectile('player', fx, fy, player.angle, 'plasma');
      fireProjectile('player', fx, fy, player.angle + 0.2, 'plasma');
    } else {
      fireProjectile('player', fx, fy, player.angle, 'plasma');
    }
    plasmaEnergy -= pCost;
    plasmaCD = 0.1;
  }
  if (rightDown && missileCD <= 0 && missileEnergy >= missileCost) {
    let fx = player.x + Math.cos(player.angle)*20;
    let fy = player.y + Math.sin(player.angle)*20;
    fireProjectile('player', fx, fy, player.angle, 'missile');
    missileEnergy -= missileCost;
    missileCD = 0.5;
  }
}

function updateEnemies(dt) {
  for (let e of enemies) {
    let dx = player.x - e.x, dy = player.y - e.y;
    let dist = Math.sqrt(dx*dx + dy*dy);
    let targetAngle = Math.atan2(dy, dx);
    e.angle = targetAngle;

    // Kamikaze — charge straight at the player, no orbit
    if (e.type === 'kamikaze') {
      let accel = e.speed * dt * 2.5;
      e.vx += Math.cos(targetAngle) * accel;
      e.vy += Math.sin(targetAngle) * accel;
    } else {
    // Approach/retreat to maintain preferred distance
    let radialForce = 0;
    if (dist > e.preferDist + 40) {
      radialForce = 1; // move toward player
    } else if (dist < e.preferDist - 40) {
      radialForce = -1.2; // back away
    } else {
      // Small nudge to stay centered in the band
      radialForce = (dist - e.preferDist) * 0.01;
    }

    // Orbit perpendicular to the player
    let orbitStrength = e.type === 'drone' ? 1.0 : e.type === 'gunship' ? 1.2 : 0.6;
    let perp = targetAngle + Math.PI/2 * e.orbitDir;

    let accel = e.speed * dt * 1.5;
    e.vx += Math.cos(targetAngle) * radialForce * accel;
    e.vy += Math.sin(targetAngle) * radialForce * accel;
    e.vx += Math.cos(perp) * orbitStrength * accel;
    e.vy += Math.sin(perp) * orbitStrength * accel;
    }


    // Avoid planets — boost speed cap when escaping
    let avoiding = avoidPlanets(e, dt);
    let maxSpd = avoiding > 0 ? e.speed * 2 : e.speed;

    let espd = Math.sqrt(e.vx*e.vx + e.vy*e.vy);
    if (espd > maxSpd) { e.vx *= maxSpd/espd; e.vy *= maxSpd/espd; }
    e.vx *= Math.pow(0.97, dt*60); e.vy *= Math.pow(0.97, dt*60);
    e.x += e.vx * dt; e.y += e.vy * dt;

    // Engine exhaust trail
    if (espd > 30) {
      spawnExhaust(e, e.color);
    }

    // Kamikazes don't shoot
    if (e.type === 'kamikaze') continue;
    // Shooting — sometimes target a nearby ally instead
    e.shootCD -= dt;
    let shootTarget = { x: player.x, y: player.y, vx: player.vx, vy: player.vy };
    for (let a of allies) {
      let adx = a.x - e.x, ady = a.y - e.y;
      let adist = Math.sqrt(adx*adx + ady*ady);
      if (adist < dist && Math.random() < 0.5) {
        shootTarget = a;
      }
    }
    let sDist = Math.sqrt((shootTarget.x-e.x)**2 + (shootTarget.y-e.y)**2);
    if (e.shootCD <= 0 && sDist < 800) {
      let bSpeed = e.type === 'bruiser' ? 200 : 350;
      let shotAngle = leadShot(e.x, e.y, e.vx, e.vy, shootTarget.x, shootTarget.y, shootTarget.vx, shootTarget.vy, bSpeed);
      let fx = e.x + Math.cos(shotAngle)*20;
      let fy = e.y + Math.sin(shotAngle)*20;
      if (e.type === 'bruiser') {
        fireProjectile('enemy', fx, fy, shotAngle, 'enemyMissile');
        e.shootCD = 2 + Math.random();
      } else {
        fireProjectile('enemy', fx, fy, shotAngle, 'enemyPlasma');
        e.shootCD = e.type === 'drone' ? 1.2 + Math.random()*0.5 : 0.7 + Math.random()*0.4;
      }
    }
  }
}

function updateAllies(dt) {
  for (let a of allies) {
    // Find nearest enemy
    let target = null, tDist = Infinity;
    for (let e of enemies) {
      let dx = e.x - a.x, dy = e.y - a.y;
      let d = Math.sqrt(dx*dx + dy*dy);
      if (d < tDist) { tDist = d; target = e; }
    }
    if (target) {
      let dx = target.x - a.x, dy = target.y - a.y;
      let targetAngle = Math.atan2(dy, dx);
      a.angle = targetAngle;

      let radialForce = 0;
      if (tDist > a.preferDist + 40) radialForce = 1;
      else if (tDist < a.preferDist - 40) radialForce = -1.2;
      else radialForce = (tDist - a.preferDist) * 0.01;

      let perp = targetAngle + Math.PI/2 * a.orbitDir;
      let accel = a.speed * dt * 1.5;
      a.vx += Math.cos(targetAngle) * radialForce * accel;
      a.vy += Math.sin(targetAngle) * radialForce * accel;
      a.vx += Math.cos(perp) * 1.0 * accel;
      a.vy += Math.sin(perp) * 1.0 * accel;

      // Shooting
      a.shootCD -= dt;
      if (a.shootCD <= 0 && tDist < 600) {
        let shotAngle = leadShot(a.x, a.y, a.vx, a.vy, target.x, target.y, target.vx, target.vy, 350);
        let fx = a.x + Math.cos(shotAngle)*18;
        let fy = a.y + Math.sin(shotAngle)*18;
        fireProjectile('ally', fx, fy, shotAngle, 'plasma');
        a.shootCD = 0.8 + Math.random() * 0.4;
      }
    } else {
      // No enemies — drift near player
      let dx = player.x - a.x, dy = player.y - a.y;
      a.angle = Math.atan2(dy, dx);
      let d = Math.sqrt(dx*dx + dy*dy);
      if (d > 150) {
        a.vx += (dx/d) * a.speed * dt;
        a.vy += (dy/d) * a.speed * dt;
      }
    }

    let aAvoiding = avoidPlanets(a, dt);
    let aMaxSpd = aAvoiding > 0 ? a.speed * 2 : a.speed;

    let aspd = Math.sqrt(a.vx*a.vx + a.vy*a.vy);
    if (aspd > aMaxSpd) { a.vx *= aMaxSpd/aspd; a.vy *= aMaxSpd/aspd; }
    a.vx *= Math.pow(0.97, dt*60); a.vy *= Math.pow(0.97, dt*60);
    a.x += a.vx * dt; a.y += a.vy * dt;

    // Exhaust trail
    if (aspd > 30) {
      spawnExhaust(a, '#0af');
    }
  }
}

function updateProjectiles(dt) {
  for (let i = projectiles.length - 1; i >= 0; i--) {
    let p = projectiles[i];
    p.x += p.vx * dt; p.y += p.vy * dt;
    p.life -= dt;
    // Trail
    if (Math.random() < 0.5) {
      particles.push({ x: p.x, y: p.y, vx: (Math.random()-0.5)*20, vy: (Math.random()-0.5)*20, life: 0.15, maxLife: 0.2, color: p.color, size: p.radius*0.6 });
    }
    if (p.life <= 0) { projectiles.splice(i, 1); continue; }

    let hit = false;

    // Player & ally projectiles hit enemies
    if (p.owner === 'player' || p.owner === 'ally') {
      for (let j = enemies.length - 1; j >= 0; j--) {
        let e = enemies[j];
        let ddx = p.x - e.x, ddy = p.y - e.y;
        if (ddx*ddx + ddy*ddy < (p.radius + e.radius) * (p.radius + e.radius)) {
          e.hp -= p.dmg;
          spawnParticles(p.x, p.y, e.color, 5, 100);
          projectiles.splice(i, 1); hit = true;
          if (e.hp <= 0) {
            if (p.owner === 'player') score += e.score;
            spawnParticles(e.x, e.y, e.color, 20, 200);
            spawnParticles(e.x, e.y, '#ff0', 10, 150);
            screenShake(0.15);
            if (Math.random() < 0.2) {
              let types = ['health', 'shield', 'spread'];
              let t = types[Math.floor(Math.random() * types.length)];
              powerups.push({ x: e.x, y: e.y, type: t, life: 15, radius: 12 });
            }
            enemies.splice(j, 1);
            enemiesAlive--;
          }
          break;
        }
      }
    }
    if (hit) continue;

    // Player projectiles can friendly-fire allies
    if (p.owner === 'player') {
      for (let j = allies.length - 1; j >= 0; j--) {
        let a = allies[j];
        let ddx = p.x - a.x, ddy = p.y - a.y;
        if (ddx*ddx + ddy*ddy < (p.radius + a.radius) * (p.radius + a.radius)) {
          a.hp -= p.dmg;
          spawnParticles(p.x, p.y, '#0af', 5, 80);
          projectiles.splice(i, 1); hit = true;
          if (a.hp <= 0) {
            spawnParticles(a.x, a.y, '#0ff', 20, 200);
            allies.splice(j, 1);
          }
          break;
        }
      }
    }
    if (hit) continue;

    // Enemy & ally projectiles hit player (friendly fire from allies too)
    if ((p.owner === 'enemy' || p.owner === 'ally') && invincTimer <= 0) {
      let ddx = p.x - player.x, ddy = p.y - player.y;
      if (ddx*ddx + ddy*ddy < (p.radius + player.radius) * (p.radius + player.radius)) {
        if (shieldTimer > 0) {
          spawnParticles(p.x, p.y, '#48f', 6, 100);
          projectiles.splice(i, 1);
          continue;
        }
        spawnParticles(p.x, p.y, '#0ff', 8, 120);
        projectiles.splice(i, 1); hit = true;
        damagePlayer(p.dmg);
      }
    }
    if (hit) continue;

    // Enemy projectiles hit allies
    if (p.owner === 'enemy') {
      for (let j = allies.length - 1; j >= 0; j--) {
        let a = allies[j];
        let ddx = p.x - a.x, ddy = p.y - a.y;
        if (ddx*ddx + ddy*ddy < (p.radius + a.radius) * (p.radius + a.radius)) {
          a.hp -= p.dmg;
          spawnParticles(p.x, p.y, '#0af', 5, 80);
          projectiles.splice(i, 1); hit = true;
          if (a.hp <= 0) {
            spawnParticles(a.x, a.y, '#0ff', 20, 200);
            allies.splice(j, 1);
          }
          break;
        }
      }
    }
  }
}

function updateCollisions(dt) {
  // Enemy-player collision
  for (let j = enemies.length - 1; j >= 0; j--) {
    let e = enemies[j];
    let ddx = e.x - player.x, ddy = e.y - player.y;
    if (ddx*ddx + ddy*ddy < (e.radius + player.radius) * (e.radius + player.radius)) {
      if (e.type === 'kamikaze') {
        // Kamikaze explodes on contact — big damage, self-destructs
        spawnParticles(e.x, e.y, '#cf0', 25, 250);
        spawnParticles(e.x, e.y, '#ff0', 15, 180);
        screenShake(0.3);
        damagePlayer(e.dmg);
        score += e.score;
        enemies.splice(j, 1);
        enemiesAlive--;
        continue;
      }
      if (invincTimer <= 0 && shieldTimer <= 0) {
        spawnParticles(player.x, player.y, '#0ff', 8, 100);
        screenShake(0.15);
        damagePlayer(15);
      }
      // Push enemy away
      let pushA = Math.atan2(ddy, ddx);
      e.vx += Math.cos(pushA) * 200;
      e.vy += Math.sin(pushA) * 200;
    }
  }

  // Ally-player collision
  for (let i = allies.length - 1; i >= 0; i--) {
    let a = allies[i];
    let ddx = a.x - player.x, ddy = a.y - player.y;
    let dist = Math.sqrt(ddx*ddx + ddy*ddy);
    if (dist < a.radius + player.radius) {
      // Push apart
      let nx = ddx/dist, ny = ddy/dist;
      a.x = player.x + nx * (a.radius + player.radius);
      a.y = player.y + ny * (a.radius + player.radius);
      let impactSpeed = Math.abs((player.vx - a.vx) * nx + (player.vy - a.vy) * ny);
      // Bounce
      a.vx += nx * impactSpeed * 0.5;
      a.vy += ny * impactSpeed * 0.5;
      player.vx -= nx * impactSpeed * 0.3;
      player.vy -= ny * impactSpeed * 0.3;
      if (impactSpeed > 30) {
        let dmg = Math.max(2, Math.floor(impactSpeed * 0.08));
        a.hp -= dmg;
        spawnParticles(a.x, a.y, '#0c6', 4, 60);
        if (a.hp <= 0) { spawnParticles(a.x, a.y, '#0ff', 20, 200); allies.splice(i, 1); }
        damagePlayer(dmg);
      }
    }
  }

  // Ally-enemy collision
  for (let i = allies.length - 1; i >= 0; i--) {
    let a = allies[i];
    let allyDead = false;
    for (let j = enemies.length - 1; j >= 0; j--) {
      let e = enemies[j];
      let ddx = a.x - e.x, ddy = a.y - e.y;
      let dist = Math.sqrt(ddx*ddx + ddy*ddy);
      if (dist < a.radius + e.radius) {
        if (e.type === 'kamikaze') {
          // Kamikaze explodes on ally contact too
          spawnParticles(e.x, e.y, '#cf0', 25, 250);
          spawnParticles(e.x, e.y, '#ff0', 15, 180);
          screenShake(0.2);
          a.hp -= e.dmg;
          score += e.score;
          enemies.splice(j, 1);
          enemiesAlive--;
          if (a.hp <= 0) { spawnParticles(a.x, a.y, '#0ff', 20, 200); allies.splice(i, 1); allyDead = true; }
          if (allyDead) break;
          continue;
        }
        let nx = ddx/dist, ny = ddy/dist;
        a.x = e.x + nx * (a.radius + e.radius);
        a.y = e.y + ny * (a.radius + e.radius);
        let impactSpeed = Math.abs((e.vx - a.vx) * nx + (e.vy - a.vy) * ny);
        a.vx += nx * impactSpeed * 0.5;
        a.vy += ny * impactSpeed * 0.5;
        e.vx -= nx * impactSpeed * 0.5;
        e.vy -= ny * impactSpeed * 0.5;
        a.hp -= 10;
        e.hp -= 10;
        spawnParticles((a.x+e.x)/2, (a.y+e.y)/2, '#ff0', 6, 80);
        if (a.hp <= 0) { spawnParticles(a.x, a.y, '#0ff', 20, 200); allies.splice(i, 1); allyDead = true; }
        if (e.hp <= 0) {
          score += e.score;
          spawnParticles(e.x, e.y, e.color, 20, 200);
          screenShake(0.1);
          enemies.splice(j, 1);
          enemiesAlive--;
        }
        if (allyDead) break;
      }
    }
  }
}

function updatePowerups(dt) {
  // Powerup timers
  if (shieldTimer > 0) shieldTimer -= dt;
  if (spreadTimer > 0) spreadTimer -= dt;

  // Powerups — pickup and expire
  for (let i = powerups.length - 1; i >= 0; i--) {
    let pu = powerups[i];
    pu.life -= dt;
    if (pu.life <= 0) { powerups.splice(i, 1); continue; }
    let dx = player.x - pu.x, dy = player.y - pu.y;
    if (dx*dx + dy*dy < (player.radius + pu.radius) * (player.radius + pu.radius)) {
      if (pu.type === 'health') {
        player.hp = Math.min(player.maxHp, player.hp + 40);
        spawnParticles(pu.x, pu.y, '#0f0', 10, 80);
      } else if (pu.type === 'shield') {
        shieldTimer = 8;
        spawnParticles(pu.x, pu.y, '#48f', 10, 80);
      } else if (pu.type === 'spread') {
        spreadTimer = 10;
        spawnParticles(pu.x, pu.y, '#f0f', 10, 80);
      }
      powerups.splice(i, 1);
    }
  }
}

function updateParticles(dt) {
  for (let i = particles.length - 1; i >= 0; i--) {
    let p = particles[i];
    p.x += p.vx * dt; p.y += p.vy * dt;
    p.life -= dt;
    if (p.life <= 0) particles.splice(i, 1);
  }
}

function update(dt) {
  if (!gameRunning) return;
  if (invincTimer > 0) invincTimer -= dt;
  updatePhysics(dt);
  updatePlayer(dt);

  // Wave spawning
  if (waveEnemiesLeft > 0) {
    waveTimer -= dt;
    if (waveTimer <= 0) {
      spawnEnemy();
      waveEnemiesLeft--;
      waveTimer = Math.max(0.3, 1.5 - wave * 0.05);
    }
  } else if (enemiesAlive <= 0) {
    score += wave * 200;
    nextWave();
  }

  updateEnemies(dt);
  updateAllies(dt);
  updateProjectiles(dt);
  updateCollisions(dt);
  updatePowerups(dt);
  updateParticles(dt);

  // Camera
  camX = player.x; camY = player.y;
  if (shakeDur > 0) {
    shakeX = (Math.random()-0.5) * 8; shakeY = (Math.random()-0.5) * 8;
    shakeDur -= dt;
  } else { shakeX = 0; shakeY = 0; }
}

function drawShip(x, y, angle, color, accent, radius, hp, maxHp, isPlayer, showHpBar, type) {
  ctx.save();
  ctx.translate(x, y);
  ctx.rotate(angle);

  // Glow
  ctx.shadowColor = color;
  ctx.shadowBlur = 15;

  if (isPlayer) {
    // Player ship — sleek arrow
    ctx.fillStyle = '#112';
    ctx.beginPath();
    ctx.moveTo(radius * 1.3, 0);
    ctx.lineTo(-radius * 0.9, -radius * 0.8);
    ctx.lineTo(-radius * 0.4, 0);
    ctx.lineTo(-radius * 0.9, radius * 0.8);
    ctx.closePath();
    ctx.fill();
    ctx.strokeStyle = color;
    ctx.lineWidth = 2;
    ctx.stroke();
    // Accent lines
    ctx.strokeStyle = accent;
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.moveTo(radius * 0.8, 0);
    ctx.lineTo(-radius * 0.2, -radius * 0.45);
    ctx.moveTo(radius * 0.8, 0);
    ctx.lineTo(-radius * 0.2, radius * 0.45);
    ctx.stroke();
    // Cockpit
    ctx.fillStyle = accent;
    ctx.beginPath();
    ctx.arc(radius * 0.3, 0, 3, 0, Math.PI*2);
    ctx.fill();
  } else {
    // Enemy ships
    ctx.fillStyle = '#111';
    if (radius > 18) {
      // Bruiser — hexagonal
      ctx.beginPath();
      for (let i = 0; i < 6; i++) {
        let a = i * Math.PI/3;
        ctx.lineTo(Math.cos(a)*radius, Math.sin(a)*radius);
      }
      ctx.closePath();
      ctx.fill();
      ctx.strokeStyle = color;
      ctx.lineWidth = 2.5;
      ctx.stroke();
      ctx.strokeStyle = accent;
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.arc(0, 0, radius*0.5, 0, Math.PI*2);
      ctx.stroke();
    } else if (radius > 14) {
      // Gunship — diamond-ish
      ctx.beginPath();
      ctx.moveTo(radius*1.1, 0);
      ctx.lineTo(0, -radius*0.7);
      ctx.lineTo(-radius*0.8, -radius*0.5);
      ctx.lineTo(-radius*0.6, 0);
      ctx.lineTo(-radius*0.8, radius*0.5);
      ctx.lineTo(0, radius*0.7);
      ctx.closePath();
      ctx.fill();
      ctx.strokeStyle = color;
      ctx.lineWidth = 2;
      ctx.stroke();
      // Wing accents
      ctx.strokeStyle = accent;
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(radius*0.5, -radius*0.2);
      ctx.lineTo(-radius*0.3, -radius*0.45);
      ctx.moveTo(radius*0.5, radius*0.2);
      ctx.lineTo(-radius*0.3, radius*0.45);
      ctx.stroke();
    } else if (type === 'kamikaze') {
      // Kamikaze — sharp dart/wedge
      ctx.beginPath();
      ctx.moveTo(radius*1.6, 0);
      ctx.lineTo(-radius*0.5, -radius*0.6);
      ctx.lineTo(-radius*0.2, 0);
      ctx.lineTo(-radius*0.5, radius*0.6);
      ctx.closePath();
      ctx.fill();
      ctx.strokeStyle = color;
      ctx.lineWidth = 2;
      ctx.stroke();
      // Danger stripes
      ctx.strokeStyle = accent;
      ctx.lineWidth = 1.5;
      ctx.beginPath();
      ctx.moveTo(radius*0.8, 0);
      ctx.lineTo(radius*0.1, -radius*0.35);
      ctx.moveTo(radius*0.8, 0);
      ctx.lineTo(radius*0.1, radius*0.35);
      ctx.stroke();
    } else {
      // Drone — small triangle
      ctx.beginPath();
      ctx.moveTo(radius, 0);
      ctx.lineTo(-radius*0.7, -radius*0.7);
      ctx.lineTo(-radius*0.3, 0);
      ctx.lineTo(-radius*0.7, radius*0.7);
      ctx.closePath();
      ctx.fill();
      ctx.strokeStyle = color;
      ctx.lineWidth = 1.5;
      ctx.stroke();
    }
    // Core dot
    ctx.fillStyle = accent;
    ctx.shadowBlur = 10;
    ctx.beginPath();
    ctx.arc(0, 0, 2, 0, Math.PI*2);
    ctx.fill();
  }
  ctx.shadowBlur = 0;
  ctx.restore();

  // HP bar (non-player ships)
  if (showHpBar && hp < maxHp) {
    let bw = radius * 2;
    let bx = x - bw/2, by = y - radius - 10;
    ctx.fillStyle = '#333';
    ctx.fillRect(bx, by, bw, 3);
    ctx.fillStyle = color;
    ctx.fillRect(bx, by, bw * (hp/maxHp), 3);
  }
}

function draw() {
  ctx.fillStyle = '#080810';
  ctx.fillRect(0, 0, W, H);

  if (!player) return;

  let ox = -camX + W/2 + shakeX;
  let oy = -camY + H/2 + shakeY;

  // Stars (parallax)
  for (let s of stars) {
    let sx = ((s.x - camX * s.depth) % 2000 + 3000) % 2000 - 1000 + W/2;
    let sy = ((s.y - camY * s.depth) % 2000 + 3000) % 2000 - 1000 + H/2;
    ctx.fillStyle = `rgba(${s.brightness},${s.brightness},${Math.min(255,s.brightness+50)},${0.5+s.depth*0.5})`;
    ctx.fillRect(sx + shakeX, sy + shakeY, s.size, s.size);
  }

  ctx.save();
  ctx.translate(ox, oy);

  // Planets
  for (let pl of planets) {
    // Glow
    ctx.shadowColor = pl.glow;
    ctx.shadowBlur = 20;
    // Body
    let grad = ctx.createRadialGradient(pl.x - pl.radius*0.3, pl.y - pl.radius*0.3, pl.radius*0.1, pl.x, pl.y, pl.radius);
    grad.addColorStop(0, pl.accent);
    grad.addColorStop(1, pl.color);
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.arc(pl.x, pl.y, pl.radius, 0, Math.PI*2);
    ctx.fill();
    // Outline
    ctx.strokeStyle = pl.glow;
    ctx.lineWidth = 1.5;
    ctx.stroke();
    ctx.shadowBlur = 0;
    // Surface detail — a couple of darker patches
    ctx.fillStyle = 'rgba(0,0,0,0.2)';
    ctx.beginPath();
    ctx.arc(pl.x + pl.radius*0.25, pl.y + pl.radius*0.15, pl.radius*0.3, 0, Math.PI*2);
    ctx.fill();
    ctx.beginPath();
    ctx.arc(pl.x - pl.radius*0.3, pl.y - pl.radius*0.25, pl.radius*0.18, 0, Math.PI*2);
    ctx.fill();
  }

  // Particles
  for (let p of particles) {
    let alpha = Math.max(0, p.life / p.maxLife);
    ctx.globalAlpha = alpha;
    ctx.fillStyle = p.color;
    ctx.shadowColor = p.color;
    ctx.shadowBlur = 6;
    ctx.fillRect(p.x - p.size/2, p.y - p.size/2, p.size, p.size);
  }
  ctx.globalAlpha = 1;
  ctx.shadowBlur = 0;

  // Projectiles
  for (let p of projectiles) {
    ctx.fillStyle = p.color;
    ctx.shadowColor = p.color;
    ctx.shadowBlur = 12;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.radius, 0, Math.PI*2);
    ctx.fill();
    if (p.radius >= 5) {
      // Missile — draw a tail
      ctx.strokeStyle = p.color;
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(p.x, p.y);
      ctx.lineTo(p.x - Math.cos(p.angle)*12, p.y - Math.sin(p.angle)*12);
      ctx.stroke();
    }
  }
  ctx.shadowBlur = 0;

  // Powerups
  for (let pu of powerups) {
    let bob = Math.sin(Date.now() * 0.005) * 3;
    let col, symbol;
    if (pu.type === 'health') { col = '#0f0'; symbol = '+'; }
    else if (pu.type === 'shield') { col = '#48f'; symbol = 'S'; }
    else { col = '#f0f'; symbol = '*'; }
    // Fading when about to expire
    ctx.globalAlpha = pu.life < 3 ? 0.3 + 0.7 * (pu.life / 3) : 1;
    ctx.shadowColor = col;
    ctx.shadowBlur = 15;
    ctx.strokeStyle = col;
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.arc(pu.x, pu.y + bob, pu.radius, 0, Math.PI * 2);
    ctx.stroke();
    ctx.fillStyle = col;
    ctx.font = 'bold 14px Courier New';
    ctx.textAlign = 'center';
    ctx.fillText(symbol, pu.x, pu.y + bob + 5);
    ctx.textAlign = 'left';
  }
  ctx.globalAlpha = 1;
  ctx.shadowBlur = 0;

  // Enemies
  for (let e of enemies) {
    drawShip(e.x, e.y, e.angle, e.color, e.accent, e.radius, e.hp, e.maxHp, false, true, e.type);
  }

  // Allies — same ship style as player, green tint
  for (let a of allies) {
    drawShip(a.x, a.y, a.angle, '#0c6', '#4f8', a.radius, a.hp, a.maxHp, true, true);
  }

  // Player
  if (invincTimer > 0 && Math.floor(invincTimer * 10) % 2 === 0) {
    // Blink
  } else {
    drawShip(player.x, player.y, player.angle, '#0cf', '#4ef', player.radius, player.hp, player.maxHp, true, false);
  }

  // Shield effect around player
  if (shieldTimer > 0) {
    let alpha = shieldTimer < 2 ? shieldTimer / 2 : 0.6;
    ctx.globalAlpha = alpha;
    ctx.strokeStyle = '#48f';
    ctx.shadowColor = '#48f';
    ctx.shadowBlur = 20;
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.arc(player.x, player.y, player.radius + 8, 0, Math.PI * 2);
    ctx.stroke();
    ctx.globalAlpha = 1;
    ctx.shadowBlur = 0;
  }

  ctx.restore();

  // HUD
  drawHUD();
}

function drawBar(x, y, w, h, pct, color, label, labelColor) {
  let pad = h > 10 ? 2 : 1;
  ctx.fillStyle = '#1118';
  ctx.fillRect(x - pad, y - pad, w + pad*2, h + pad*2);
  ctx.fillStyle = '#222';
  ctx.fillRect(x, y, w, h);
  ctx.fillStyle = color;
  ctx.shadowColor = color;
  ctx.shadowBlur = h > 10 ? 8 : 6;
  ctx.fillRect(x, y, w * pct, h);
  ctx.shadowBlur = 0;
  ctx.fillStyle = labelColor || color;
  ctx.font = (h > 10 ? 12 : 10) + 'px Courier New';
  ctx.fillText(label, x + w + 8, y + h - (h > 10 ? 3 : 0));
}

function drawHUD() {
  let barW = 200, barX = 20, barY = 20;

  // Health bar
  let hpPct = player.hp / player.maxHp;
  let hpColor = hpPct > 0.5 ? '#0f0' : hpPct > 0.25 ? '#ff0' : '#f00';
  drawBar(barX, barY, barW, 16, hpPct, hpColor, 'HP', '#fff');

  // Plasma energy bar
  let ammoBarY = barY + 20;
  drawBar(barX, ammoBarY, barW, 8, plasmaEnergy / plasmaMax, '#0ff', 'PLASMA');

  // Missile energy bar
  let missBarY = ammoBarY + 11;
  drawBar(barX, missBarY, barW, 8, missileEnergy / missileMax, '#0f0', 'MISSILE');

  // Lives
  ctx.fillStyle = '#0ff';
  ctx.shadowColor = '#0ff';
  ctx.shadowBlur = 6;
  ctx.font = '16px Courier New';
  ctx.fillText('LIVES: ' + lives, barX, missBarY + 8 + 18);
  ctx.shadowBlur = 0;

  // Score
  ctx.fillStyle = '#ff0';
  ctx.shadowColor = '#ff0';
  ctx.shadowBlur = 6;
  ctx.font = '20px Courier New';
  ctx.textAlign = 'right';
  ctx.fillText('SCORE: ' + score, W - 20, 34);
  ctx.shadowBlur = 0;

  // Wave
  ctx.fillStyle = '#0f0';
  ctx.shadowColor = '#0f0';
  ctx.shadowBlur = 6;
  ctx.font = '16px Courier New';
  ctx.fillText('WAVE ' + wave, W - 20, 58);
  ctx.shadowBlur = 0;
  ctx.textAlign = 'left';

  // Active powerup indicators
  let puY = missBarY + 8 + 36;
  if (shieldTimer > 0) {
    ctx.fillStyle = '#48f';
    ctx.shadowColor = '#48f';
    ctx.shadowBlur = 6;
    ctx.font = '14px Courier New';
    ctx.fillText('SHIELD ' + Math.ceil(shieldTimer) + 's', barX, puY);
    ctx.shadowBlur = 0;
    puY += 18;
  }
  if (spreadTimer > 0) {
    ctx.fillStyle = '#f0f';
    ctx.shadowColor = '#f0f';
    ctx.shadowBlur = 6;
    ctx.font = '14px Courier New';
    ctx.fillText('SPREAD ' + Math.ceil(spreadTimer) + 's', barX, puY);
    ctx.shadowBlur = 0;
  }

  // Radar
  let radarR = 80;
  let radarX = W - radarR - 20;
  let radarY = H - radarR - 20;
  let radarRange = 3000; // world units visible on radar

  // Background
  ctx.save();
  ctx.beginPath();
  ctx.arc(radarX, radarY, radarR, 0, Math.PI * 2);
  ctx.clip();
  ctx.fillStyle = 'rgba(0,4,12,0.7)';
  ctx.fill();

  // Range rings
  ctx.strokeStyle = 'rgba(0,255,255,0.08)';
  ctx.lineWidth = 1;
  for (let r = 1; r <= 3; r++) {
    ctx.beginPath();
    ctx.arc(radarX, radarY, radarR * r / 3, 0, Math.PI * 2);
    ctx.stroke();
  }

  // Crosshair lines
  ctx.strokeStyle = 'rgba(0,255,255,0.06)';
  ctx.beginPath();
  ctx.moveTo(radarX - radarR, radarY);
  ctx.lineTo(radarX + radarR, radarY);
  ctx.moveTo(radarX, radarY - radarR);
  ctx.lineTo(radarX, radarY + radarR);
  ctx.stroke();

  // Helper to plot a blip
  function blip(wx, wy, color, size) {
    let dx = (wx - player.x) / radarRange * radarR;
    let dy = (wy - player.y) / radarRange * radarR;
    let dist = Math.sqrt(dx * dx + dy * dy);
    if (dist > radarR - 2) {
      // Clamp to edge
      dx = dx / dist * (radarR - 2);
      dy = dy / dist * (radarR - 2);
    }
    ctx.fillStyle = color;
    ctx.fillRect(radarX + dx - size / 2, radarY + dy - size / 2, size, size);
  }

  // Planets
  for (let pl of planets) {
    let dx = (pl.x - player.x) / radarRange * radarR;
    let dy = (pl.y - player.y) / radarRange * radarR;
    let pr = Math.max(2, pl.radius / radarRange * radarR);
    ctx.fillStyle = 'rgba(255,255,255,0.1)';
    ctx.beginPath();
    ctx.arc(radarX + dx, radarY + dy, pr, 0, Math.PI * 2);
    ctx.fill();
  }

  // Enemies
  for (let e of enemies) blip(e.x, e.y, e.color, 3);
  // Allies
  for (let a of allies) blip(a.x, a.y, '#0c6', 3);
  // Powerups
  for (let pu of powerups) {
    let col = pu.type === 'health' ? '#0f0' : pu.type === 'shield' ? '#48f' : '#f0f';
    blip(pu.x, pu.y, col, 2);
  }

  // Player (center dot)
  ctx.fillStyle = '#0ff';
  ctx.fillRect(radarX - 1.5, radarY - 1.5, 3, 3);

  // Player facing line
  ctx.strokeStyle = '#0ff';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(radarX, radarY);
  ctx.lineTo(radarX + Math.cos(player.angle) * 10, radarY + Math.sin(player.angle) * 10);
  ctx.stroke();

  ctx.restore();

  // Border ring (outside clip)
  ctx.strokeStyle = 'rgba(0,255,255,0.3)';
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.arc(radarX, radarY, radarR, 0, Math.PI * 2);
  ctx.stroke();
}

function gameOver() {
  gameRunning = false;
  gameOverActive = true;
  document.getElementById('finalScore').textContent = 'Score: ' + score;
  document.getElementById('finalWave').textContent = 'Wave Reached: ' + wave;
  document.getElementById('nameInput').value = localStorage.getItem('sd_playerName') || '';
  document.getElementById('gameOver').classList.add('active');
  showLeaderboard();
}

function showLeaderboard() {
  let lb = JSON.parse(localStorage.getItem('sd_leaderboard') || '[]');
  let html = '<h2>TOP SCORES</h2>';
  lb.sort((a,b) => b.score - a.score);
  lb.slice(0, 5).forEach((e, i) => {
    html += `<div class="lb-entry${i===0?' gold':''}">${i+1}. ${e.name} — ${e.score} (Wave ${e.wave})</div>`;
  });
  if (lb.length === 0) html += '<div class="lb-entry">No scores yet</div>';
  document.getElementById('leaderboard').innerHTML = html;
}

document.getElementById('submitScore').addEventListener('click', () => {
  let name = document.getElementById('nameInput').value.trim() || 'ACE';
  localStorage.setItem('sd_playerName', name);
  let lb = JSON.parse(localStorage.getItem('sd_leaderboard') || '[]');
  lb.push({ name, score, wave });
  lb.sort((a,b) => b.score - a.score);
  if (lb.length > 5) lb.length = 5;
  localStorage.setItem('sd_leaderboard', JSON.stringify(lb));
  showLeaderboard();
  document.getElementById('submitScore').disabled = true;
  document.getElementById('submitScore').textContent = 'SAVED';
});

document.getElementById('restartBtn').addEventListener('click', () => {
  document.getElementById('gameOver').classList.remove('active');
  document.getElementById('submitScore').disabled = false;
  document.getElementById('submitScore').textContent = 'SAVE SCORE';
  document.getElementById('nameInput').value = localStorage.getItem('sd_playerName') || '';
  gameOverActive = false;
  initGame();
  gameRunning = true;
});

document.getElementById('startBtn').addEventListener('click', () => {
  document.getElementById('startScreen').classList.add('hidden');
  initGame();
  gameRunning = true;
});

function loop(time) {
  let dt = Math.min((time - lastTime) / 1000, 0.05);
  lastTime = time;
  update(dt);
  draw();
  requestAnimationFrame(loop);
}
requestAnimationFrame(t => { lastTime = t; requestAnimationFrame(loop); });
</script>
</body>
</html>
